<!-- Close Action (Alternative to tapping scrim) -->
<button class="mt-lg w-full py-md border border-outline-variant rounded-lg font-label-md text-label-md hover:bg-surface-container-high transition-colors" onclick="closeSheet()">
                Cancel
            </button>
</div>

<script>
        const sheet = document.getElementById('bottom-sheet');
        const scrim = document.getElementById('scrim');

        function openSheet() {
            sheet.classList.remove('translate-y-full');
            sheet.classList.add('translate-y-0');
            scrim.classList.remove('opacity-0', 'pointer-events-none');
            scrim.classList.add('opacity-100');
        }

        function closeSheet() {
            sheet.classList.remove('translate-y-0');
            sheet.classList.add('translate-y-full');
            scrim.classList.remove('opacity-100');
            scrim.classList.add('opacity-0', 'pointer-events-none');
        }

        scrim.addEventListener('click', closeSheet);

        // Initial state for demonstration (Sheet is open by default as per prompt request)
        // Ensure it doesn't just flicker
        window.addEventListener('load', () => {
           // We keep it open since Screen 3 IS the bottom sheet overlaying.
        });

        // Simple touch-to-drag simulation (Visual only)
        let startY = 0;
        sheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        sheet.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            if (deltaY > 0) {
                sheet.style.transform = `translateY(${deltaY}px)`;
            }
        });

        sheet.addEventListener('touchend', (e) => {
            const currentY = e.changedTouches[0].clientY;
            const deltaY = currentY - startY;
            sheet.style.transform = '';
            if (deltaY > 100) {
                closeSheet();
            }
        });
    </script>
