<script>
        function updateCtaState() {
            const sendBtn = document.getElementById('send-btn');
            const radios = document.getElementsByName('friend-select');
            let isSelected = false;

            for (const radio of radios) {
                if (radio.checked) {
                    isSelected = true;
                    break;
                }
            }

            if (isSelected) {
                sendBtn.disabled = false;
                sendBtn.classList.remove('bg-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                sendBtn.classList.add('bg-primary', 'hover:opacity-90', 'active:scale-95');
            } else {
                sendBtn.disabled = true;
                sendBtn.classList.add('bg-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                sendBtn.classList.remove('bg-primary', 'hover:opacity-90', 'active:scale-95');
            }
        }

        // Simple search filter simulation
        const searchInput = document.querySelector('input[type="text"]');
        const friendItems = document.querySelectorAll('#friends-list > div');
        const emptyState = document.getElementById('empty-state');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let visibleCount = 0;

            friendItems.forEach(item => {
                const name = item.querySelector('.text-on-surface').textContent.toLowerCase();
                const email = item.querySelector('.text-on-surface-variant').textContent.toLowerCase();
                
                if (name.includes(query) || email.includes(query)) {
                    item.style.display = 'block';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            if (visibleCount === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }
        });

        // Click interaction for "Send Invitation"
        document.getElementById('send-btn').addEventListener('click', () => {
            alert('Invitation sent successfully!');
        });
    </script>
