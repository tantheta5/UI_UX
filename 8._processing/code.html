<script>
        // Simple progress simulation
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');
        const statusText = document.getElementById('status-text');
        const scanline = document.getElementById('scanline');
        
        const statuses = [
            'Syncing Profiles',
            'Matching Beats',
            'Calculating Overlap',
            'Finding Deep Cuts',
            'Generating Flow',
            'Polishing Blend'
        ];

        let progress = 0;
        let scanPos = 0;

        const updateProgress = () => {
            if (progress < 100) {
                // Slower at the end to build anticipation
                const increment = progress > 80 ? 0.5 : 1.2;
                progress += increment;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = `${progress}%`;
                percentageText.innerText = `${Math.floor(progress)}%`;
                
                // Update status text based on progress
                const statusIndex = Math.floor((progress / 100) * statuses.length);
                if (statuses[statusIndex]) {
                    statusText.innerText = statuses[statusIndex];
                }
                
                requestAnimationFrame(updateProgress);
            }
        };

        const updateScanline = () => {
            scanPos = (scanPos + 0.5) % 100;
            scanline.style.top = `${scanPos}%`;
            requestAnimationFrame(updateScanline);
        };

        // Start animations
        setTimeout(() => {
            updateProgress();
            updateScanline();
        }, 800);
    </script>
