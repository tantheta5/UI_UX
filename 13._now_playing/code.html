<body class="bg-surface text-on-surface font-body-md flex flex-col min-h-screen">
<!-- TopAppBar -->

</button>

<button class="flex items-center justify-center w-11 h-11 hover:bg-surface-container-high transition-colors duration-200 rounded-full">

</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-14 mb-16 px-margin-mobile flex flex-col items-center justify-center max-w-lg mx-auto w-full space-y-lg">
<!-- Album Artwork (Bento Pattern Inspiration) -->

<div class="absolute bottom-md left-md">
<!-- Blend Badge -->
<div class="bg-primary text-on-primary px-3 py-1 rounded-full flex items-center gap-1.5 shadow-sm">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">join_inner</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Blend</span>
</div>
</div>
</div>
<!-- Song Info & Like Button -->
<div class="w-full flex items-center justify-between">
<div class="flex flex-col">

</div>
<button class="w-12 h-12 flex items-center justify-center hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-primary text-[28px]">favorite</span>
</button>
</div>
<!-- Progress Bar -->
<div class="w-full space-y-base">
<div class="playback-progress-track">
<div class="playback-progress-fill">
<div class="playback-progress-thumb"></div>
</div>
</div>
<div class="flex justify-between w-full">

<span class="font-label-sm text-label-sm text-on-surface-variant">3:45</span>
</div>
</div>
<!-- Playback Controls -->
<div class="w-full flex items-center justify-between px-md py-md">
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">shuffle</span>
</button>
<div class="flex items-center gap-lg">
<button class="w-12 h-12 flex items-center justify-center text-primary hover:bg-surface-container-high rounded-full transition-colors">

</button>
</div>
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">repeat</span>
</button>
</div>
<!-- Extra Controls Row -->
<div class="w-full flex justify-center items-center gap-xl">
<button class="flex items-center gap-2 px-md py-sm border border-outline-variant rounded-full hover:bg-surface-container-low transition-colors">

</button>

<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>

<span class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm">Search</span>
</a>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">library_music</span>
<span class="font-label-sm text-label-sm">Library</span>
</a>

<span class="material-symbols-outlined">workspace_premium</span>
<span class="font-label-sm text-label-sm">Premium</span>
</a>
</nav>
<script>
        // Micro-interaction: Play/Pause toggle simulation
        const playButton = document.querySelector('main button.bg-primary');
        const playIcon = playButton.querySelector('.material-symbols-outlined');
        let isPlaying = true;

        playButton.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playIcon.textContent = isPlaying ? 'pause' : 'play_arrow';
            playIcon.style.fontVariationSettings = isPlaying ? "'FILL' 1" : "'FILL' 0";
        });

        // Like button toggle
        const likeButton = document.querySelector('button .material-symbols-outlined[textContent="favorite"]');
        let isLiked = false;
        
        document.querySelectorAll('button').forEach(btn => {
            if(btn.querySelector('.material-symbols-outlined')?.textContent === 'favorite') {
                btn.addEventListener('click', () => {
                    isLiked = !isLiked;
                    const icon = btn.querySelector('.material-symbols-outlined');
                    icon.style.fontVariationSettings = isLiked ? "'FILL' 1" : "'FILL' 0";
                    icon.classList.toggle('text-primary');
                    if(isLiked) {
                        icon.style.color = '#000'; // Specific black for active liked
                    } else {
                        icon.style.color = '';
                    }
                });
            }
        });
    </script>
