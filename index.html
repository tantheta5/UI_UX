<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Music Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Liquid chrome gradient */
      --grad-chrome: linear-gradient(135deg, #C98B86 0%, #A89BC2 35%, #8AA68E 70%, #E2A87F 100%);
      --grad-chrome-soft: linear-gradient(135deg, #F4DAD6 0%, #E5DEF0 35%, #DCE7DE 70%, #F6E0CE 100%);

      /* Secondary — sage */
      --color-secondary: #8AA68E;
      --color-secondary-deep: #6B8770;
      --color-secondary-soft: #DCE7DE;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-2xl: 28px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: transparent;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--sp-8) var(--sp-6);
      overflow-x: hidden;
    }

    /* Ambient soft glow background elements */
    .glow-top {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 60%;
      height: 40%;
      background: var(--grad-chrome-soft);
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .glow-bottom {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60%;
      height: 40%;
      background: var(--grad-chrome-soft);
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 1;
      justify-content: center;
      gap: var(--sp-8);
    }

    .hero-placeholder {
      position: relative;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      box-shadow: var(--sh-md);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 300ms var(--ease-out), box-shadow 300ms var(--ease-out);
    }

    .hero-placeholder:hover {
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: var(--sh-lg);
    }

    .hero-placeholder-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: radial-gradient(var(--color-ink) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      transition: transform 500ms var(--ease-out);
    }

    .hero-placeholder:hover .hero-img {
      transform: scale(1.04);
    }

    .hero-icon {
      z-index: 2;
      width: 64px;
      height: 64px;
      color: var(--color-ink-3);
    }

    .hero-line {
      width: 80px;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--r-full);
      margin-top: var(--sp-3);
      z-index: 2;
    }

    .text-section {
      text-align: center;
      max-width: 320px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      line-height: var(--lh-tight);
      margin-bottom: var(--sp-3);
      letter-spacing: var(--ls-tight);
    }

    p.subtext {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    .actions-section {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      margin-top: var(--sp-6);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), box-shadow 150ms var(--ease-out), background 150ms var(--ease-out), color 150ms var(--ease-out);
      text-decoration: none;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--grad-chrome);
      color: var(--color-bg);
      box-shadow: var(--sh-sm);
    }

    .btn-primary:hover {
      opacity: 0.9;
      box-shadow: var(--sh-md);
    }

    .btn-secondary {
      background-color: var(--color-surface);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .btn-secondary:hover {
      background-color: var(--color-surface-3);
    }

    .disclaimer {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      text-align: center;
      line-height: var(--lh-normal);
      padding: 0 var(--sp-4);
      margin-top: var(--sp-3);
    }

    .underline {
      text-decoration: underline;
      cursor: pointer;
    }
  
    /* Dynamic Animated Gradient Background with Noise */
    .dynamic-bg-container {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* Stacking context fix to bring content above absolute background */
    .mobile-container > *:not(.dynamic-bg-container):not(header):not(nav):not(.toast):not(.fab):not(.glow-top):not(.glow-bottom) {
      position: relative;
      z-index: 1;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: blur(60px);
      opacity: 0.95;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #C98B86;
      animation: move-1 16s infinite ease-in-out;
    }

    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #D9A86A;
      animation: move-2 18s infinite ease-in-out;
    }

    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 14s infinite ease-in-out;
    }

    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFF8D4;
      animation: move-4 15s infinite ease-in-out;
    }

    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #D9A86A;
      animation: move-5 17s infinite ease-in-out;
    }

    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #ffb672;
      animation: move-6 16s infinite ease-in-out;
    }

    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-140px, 180px) scale(1.2); }
      66% { transform: translate(-40px, 240px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-180px, -140px) scale(0.85); }
      66% { transform: translate(-90px, -240px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(160px, 120px) scale(1.25); }
      66% { transform: translate(240px, 40px) scale(0.8); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(190px, 150px) scale(0.8); }
      66% { transform: translate(120px, -80px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(180px, -180px) scale(1.3); }
      66% { transform: translate(250px, -90px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(0.85); }
      66% { transform: translate(-220px, -40px) scale(1.25); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

  </style>
</head>
<body>

  <div class="mobile-container">
    <!-- Dynamic background wrapper -->
    <div class="dynamic-bg-container">
      <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
      </div>
      <!-- Grain/Noise Overlay -->
      <div class="noise-overlay"></div>
    </div>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <main class="content-wrapper">
      <!-- Hero Image -->
      <div class="hero-placeholder">
        <div class="hero-placeholder-pattern"></div>
        <img class="hero-img" alt="Chorus App" src="recreated/chorus.png">
      </div>

      <!-- Welcome Text -->
      <div class="text-section">
        <h1>Chorus</h1>
        <p class="subtext">Experience sound in its purest form. High fidelity streaming for the modern ear.</p>
      </div>
    </main>

    <!-- Action Buttons -->
    <div class="actions-section">
      <button class="btn btn-primary" onclick="location.href='recreated/0.2_sign_up/code.html'">Sign Up</button>
      <button class="btn btn-secondary" onclick="location.href='recreated/0.1_sign_in/code.html'">Sign In</button>
      <p class="disclaimer">
        By continuing, you agree to our <span class="underline">Terms of Service</span> and <span class="underline">Privacy Policy</span>.
      </p>
    </div>
  </div>

</body>
</html>
