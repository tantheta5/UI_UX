<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fa;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Mobile specific constraints for wireframe feel */
        .mobile-container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            background: #ffffff;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="text-on-surface">
<main class="mobile-container flex flex-col items-center justify-between py-2xl px-margin-mobile" style="opacity: 1;">
<!-- Hero Section -->
<div class="w-full flex flex-col items-center flex-grow justify-center gap-xl">
<!-- Large Placeholder for Hero Image/Logo -->
<div class="relative w-full aspect-square max-w-[320px] rounded-xl overflow-hidden border border-outline-variant bg-surface-container flex items-center justify-center">
<div class="absolute inset-0 opacity-10">
<!-- Subtle pattern for wireframe texture -->
<div class="w-full h-full" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px;"></div>
</div>
<div class="z-10 flex flex-col items-center gap-md">
<span class="material-symbols-outlined text-[64px] text-outline" style="font-variation-settings: 'FILL' 0;">album</span>
<div class="h-1 w-24 bg-outline-variant rounded-full"></div>
</div>
<!-- Image Placeholder with data-alt for future high-fidelity swap -->
<img class="absolute inset-0 w-full h-full object-cover opacity-20" data-alt="A minimalist black and white conceptual photograph of a vinyl record spinning on a modern turntable. The lighting is dramatic with high contrast, creating deep shadows and bright highlights on the grooves of the record. The background is a clean, neutral gray gallery wall, emphasizing a sophisticated and professional music streaming brand identity. The composition is centered and balanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_kW5kdTEusPY232k6r5hxt42Lwx5DJarlMPOAcYDXdvQPPJBvQIrCQzg_G2H3JuB8DQMeQERm_GTdn5htVTlsvWgpmlBh7I4zT3OlfQNwtnAkUI56QhiRPX-uQ68ToxYzBfTc2dbba-oXHQyGYW2N-UN5Z9TthRPzIlnj_T8lurspBLVNEfbLDKozAyeEw6gJ4g4vOyi6beJgIS22Tk84QSrphCcBJJQ0KO8VUrO-HHs7NOB-ftKu">
</div>
<!-- Welcome Text -->
<div class="text-center space-y-sm">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile text-on-surface">
                    Your music, blended.
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                    Experience sound in its purest form. High fidelity streaming for the modern ear.
                </p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-md mt-3xl">
<!-- Primary Action: Sign Up -->
<button class="w-full h-14 bg-primary text-on-primary font-label-md text-label-md rounded-full flex items-center justify-center transition-transform active:scale-95 duration-150 shadow-sm">
                Sign Up
            </button>
<!-- Secondary Action: Sign In -->
<button class="w-full h-14 bg-surface border border-primary text-primary font-label-md text-label-md rounded-full flex items-center justify-center transition-transform active:scale-95 duration-150">
                Sign In
            </button>
<!-- Legal/Terms link -->
<p class="text-center font-label-sm text-label-sm text-on-surface-variant px-lg mt-sm">
                By continuing, you agree to our <span class="underline">Terms of Service</span> and <span class="underline">Privacy Policy</span>.
            </p>
</div>
</main>
<!-- Visual Polish: Soft Glow effect (Atmospheric) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-surface-container-high blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-surface-container-high blur-[120px] pointer-events-none -z-10"></div>
<script>
        // Micro-interaction for button feedback or page loading state
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                // Haptic feedback could be triggered here if in a native wrapper
            });
        });

        // Simple Fade-in effect for the UI elements
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.mobile-container');
            container.style.opacity = '0';
            container.style.transition = 'opacity 0.6s ease-out';
            
            requestAnimationFrame(() => {
                container.style.opacity = '1';
            });
        });
    </script>
</body></html>
