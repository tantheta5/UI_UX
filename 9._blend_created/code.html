<script>
        // Simple micro-interaction for primary button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.classList.add('scale-95');
            setTimeout(() => this.classList.remove('scale-95'), 150);
        });

        // Background Atmosphere effect: Subtle subtle shifting gradient for a "living" wireframe
        document.body.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 5;
            const y = (e.clientY / window.innerHeight) * 5;
            document.body.style.backgroundPosition = `${x}% ${y}%`;
        });
    </script>
