<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: transparent;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 64px; /* bottom nav */
      height: 100vh;
      overflow-y: auto;
    }

    header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px) saturate(120%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
      -webkit-backdrop-filter: blur(24px) saturate(120%);
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5) var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
      flex: 1;
      justify-content: space-between;
    }

    /* Artwork with badge */
    .artwork-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow: var(--sh-md);
      background: var(--grad-chrome-soft);
    }

    .artwork-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      mix-blend-mode: multiply;
    }

    .blend-badge {
      position: absolute;
      bottom: var(--sp-4);
      left: var(--sp-4);
      background-color: var(--color-ink);
      color: var(--color-bg);
      border-radius: var(--r-full);
      padding: 6px 14px;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      box-shadow: var(--sh-sm);
      text-decoration: none;
      cursor: pointer;
      transition: transform 150ms var(--ease-out);
    }

    .blend-badge:active {
      transform: scale(0.95);
    }

    .blend-badge svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Meta Info row */
    .meta-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--sp-1);
    }

    .song-details {
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
    }

    .song-title {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
    }

    .artist-name {
      font-size: var(--fs-base);
      color: var(--color-ink-3);
    }

    .btn-like {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-ink-4);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      transition: color 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .btn-like:hover {
      background-color: var(--color-surface-3);
      color: var(--color-ink);
    }

    .btn-like.liked {
      color: var(--color-primary-deep);
    }

    .btn-like svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      transition: fill 200ms var(--ease-out);
    }

    .btn-like.liked svg {
      fill: var(--color-primary);
      stroke: var(--color-primary-deep);
    }

    /* Progress slider style */
    .progress-container {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      width: 100%;
    }

    .progress-slider {
      width: 100%;
      height: 4px;
      background-color: var(--color-surface-3);
      border-radius: var(--r-full);
      position: relative;
      cursor: pointer;
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 37%;
      background-color: var(--color-primary);
      border-radius: var(--r-full);
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      left: 37%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: var(--r-full);
      background-color: var(--color-primary-deep);
      box-shadow: var(--sh-sm);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      font-family: var(--font-mono);
    }

    /* Controls block */
    .controls-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--sp-4);
    }

    .control-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-ink-3);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--r-full);
      transition: color 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .control-icon:hover {
      color: var(--color-ink);
      background-color: var(--color-surface-3);
    }

    .control-icon.active {
      color: var(--color-primary-deep);
    }

    .control-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .btn-play-pause {
      width: 72px;
      height: 72px;
      border-radius: var(--r-full);
      background-color: var(--color-primary);
      color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--sh-md);
      border: none;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .btn-play-pause:hover {
      background-color: var(--color-primary-deep);
    }

    .btn-play-pause:active {
      transform: scale(0.95);
    }

    .btn-play-pause svg {
      width: 32px;
      height: 32px;
      fill: currentColor;
    }

    /* Extra Bottom buttons */
    .extras-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-5);
      margin-top: var(--sp-1);
    }

    .btn-extra {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 8px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--r-full);
      background-color: var(--color-surface);
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      cursor: pointer;
      text-decoration: none;
      transition: background-color 150ms var(--ease-out), color 150ms var(--ease-out);
    }

    .btn-extra:hover {
      background-color: var(--color-surface-2);
      color: var(--color-ink);
    }

    .btn-extra svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Fixed Bottom Navigation (Library active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-bottom: none;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
    
      backdrop-filter: blur(5px) saturate(120%);
      -webkit-backdrop-filter: blur(5px) saturate(120%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 32px rgba(31, 27, 22, 0.06);}

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
      transition: color 150ms var(--ease-out);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item:hover {
      color: var(--color-ink);
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  
    /* Dynamic Animated Gradient Background with Noise */
    .dynamic-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* Stacking context fix to bring content above absolute background */
    .mobile-container > *:not(.dynamic-bg-container):not(header):not(nav):not(.toast):not(.fab) {
      position: relative;
      z-index: 1;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: blur(60px);
      opacity: 0.95;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #C98B86;
      animation: move-1 16s infinite ease-in-out;
    }

    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #D9A86A;
      animation: move-2 18s infinite ease-in-out;
    }

    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 14s infinite ease-in-out;
    }

    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFF8D4;
      animation: move-4 15s infinite ease-in-out;
    }

    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #D9A86A;
      animation: move-5 17s infinite ease-in-out;
    }

    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #ffb672;
      animation: move-6 16s infinite ease-in-out;
    }

    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-140px, 180px) scale(1.2); }
      66% { transform: translate(-40px, 240px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-180px, -140px) scale(0.85); }
      66% { transform: translate(-90px, -240px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(160px, 120px) scale(1.25); }
      66% { transform: translate(240px, 40px) scale(0.8); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(190px, 150px) scale(0.8); }
      66% { transform: translate(120px, -80px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(180px, -180px) scale(1.3); }
      66% { transform: translate(250px, -90px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(0.85); }
      66% { transform: translate(-220px, -40px) scale(1.25); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

</style>
</head>
<body>

  <div class="mobile-container">
    <!-- Dynamic background wrapper -->
    <div class="dynamic-bg-container">
      <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
      </div>
      <!-- Grain/Noise Overlay -->
      <div class="noise-overlay"></div>
    </div>
    <!-- Header -->
    <header>
      <button class="back-btn" onclick="location.href='../10._blend_playlist/code.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="header-title">Now Playing</div>
      <button class="more-btn" onclick="location.href='../18._blend_settings/code.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Album Artwork -->
      <section class="artwork-container">
        <img data-alt="A colorful abstract digital sculpture waves album cover art." src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=800&q=80">
        
        <!-- Blend Badge linking to Share Overlay -->
        <a class="blend-badge" href="../13._share_blend/code.html">
          <svg viewBox="0 0 24 24">
            <path d="M12 2A10 10 0 0 0 2 12a9.89 9.89 0 0 0 2.26 6.33l-2 2a1 1 0 0 0-.21 1.09A1 1 0 0 0 3 22h9a10 10 0 0 0 0-20zm0 18H5.41l1.3-1.3a1 1 0 0 0 0-1.41 8 8 0 1 1 5.29 2.71z"></path>
          </svg>
          <span>Blend</span>
        </a>
      </section>

      <!-- Song Meta Info -->
      <section class="meta-container">
        <div class="song-details">
          <h2 class="song-title">Ethereal Currents</h2>
          <span class="artist-name">Systematic Harmony</span>
        </div>
        <button class="btn-like" id="likeBtn" onclick="toggleLike()">
          <svg viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </section>

      <!-- Playback Progress -->
      <section class="progress-container">
        <div class="progress-slider" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">1:24</span>
          <span>3:45</span>
        </div>
      </section>

      <!-- Playback Controls -->
      <section class="controls-container">
        <button class="control-icon" onclick="this.classList.toggle('active')">
          <!-- Shuffle -->
          <svg viewBox="0 0 24 24">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
        </button>

        <button class="control-icon">
          <!-- Skip Previous -->
          <svg viewBox="0 0 24 24">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>

        <button class="btn-play-pause" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="playIcon">
            <!-- Pause state initially -->
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>

        <button class="control-icon">
          <!-- Skip Next -->
          <svg viewBox="0 0 24 24">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>

        <button class="control-icon" onclick="this.classList.toggle('active')">

  <script>
    // Play state logic
    let isPlaying = true;
    function togglePlay() {
      isPlaying = !isPlaying;
      const playIcon = document.getElementById('playIcon');
      if (isPlaying) {
        // Pause icon SVG
        playIcon.innerHTML = `
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        `;
      } else {
        // Play icon SVG
        playIcon.innerHTML = `
          <polygon points="6 3 20 12 6 21 6 3"></polygon>
        `;
      }
    }

    // Like toggle state logic
    let isLiked = false;
    function toggleLike() {
      isLiked = !isLiked;
      const likeBtn = document.getElementById('likeBtn');
      likeBtn.classList.toggle('liked', isLiked);
    }

    // Seek simulation logic
    function seek(event) {
      const slider = event.currentTarget;
      const rect = slider.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const width = rect.width;
      const percentage = Math.max(0, Math.min(100, (clickX / width) * 100));
      
      document.getElementById('progressFill').style.width = percentage + '%';
      document.getElementById('progressThumb').style.left = percentage + '%';

      // Update time label
      const totalSeconds = 225; // 3:45
      const currentSeconds = Math.round((percentage / 100) * totalSeconds);
      const minutes = Math.floor(currentSeconds / 60);
      const seconds = currentSeconds % 60;
      document.getElementById('currentTime').innerText = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    }
  </script>
