<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Music Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Secondary — sage */
      --color-secondary: #8AA68E;
      --color-secondary-deep: #6B8770;
      --color-secondary-soft: #DCE7DE;

      /* Liquid chrome gradients */
      --grad-chrome: linear-gradient(135deg, #C98B86 0%, #A89BC2 35%, #8AA68E 70%, #E2A87F 100%);
      --grad-chrome-soft: linear-gradient(135deg, #F4DAD6 0%, #E5DEF0 35%, #DCE7DE 70%, #F6E0CE 100%);

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-2xl: 28px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--sp-8) var(--sp-6);
      overflow-x: hidden;
    }

    /* Ambient soft glow background elements */
    .glow-top {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 60%;
      height: 40%;
      background: var(--grad-chrome-soft);
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .glow-bottom {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60%;
      height: 40%;
      background: var(--grad-chrome-soft);
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 1;
      justify-content: center;
      gap: var(--sp-8);
    }

    .hero-placeholder {
      position: relative;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      box-shadow: var(--sh-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-placeholder-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: radial-gradient(var(--color-ink) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-cover: cover;
      opacity: 0.15;
      mix-blend-mode: multiply;
    }

    .hero-icon {
      z-index: 2;
      width: 64px;
      height: 64px;
      color: var(--color-ink-3);
    }

    .hero-line {
      width: 80px;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--r-full);
      margin-top: var(--sp-3);
      z-index: 2;
    }

    .text-section {
      text-align: center;
      max-width: 320px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      line-height: var(--lh-tight);
      margin-bottom: var(--sp-3);
      letter-spacing: var(--ls-tight);
    }

    p.subtext {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    .actions-section {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      margin-top: var(--sp-6);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), box-shadow 150ms var(--ease-out), background 150ms var(--ease-out), color 150ms var(--ease-out);
      text-decoration: none;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-bg);
      box-shadow: var(--sh-sm);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-deep);
      box-shadow: var(--sh-md);
    }

    .btn-secondary {
      background-color: var(--color-surface);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .btn-secondary:hover {
      background-color: var(--color-surface-3);
    }

    .disclaimer {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      text-align: center;
      line-height: var(--lh-normal);
      padding: 0 var(--sp-4);
      margin-top: var(--sp-3);
    }

    .underline {
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="mobile-container">
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <main class="content-wrapper">
      <!-- Square Placeholder for Hero Image -->
      <div class="hero-placeholder">
        <div class="hero-placeholder-pattern"></div>
        <div style="z-index: 2; display: flex; flex-direction: column; align-items: center;">
          <!-- SVG Vinyl Disc -->
          <svg class="hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <div class="hero-line"></div>
        </div>
        <img class="hero-img" data-alt="A minimalist conceptual photograph of a vinyl record spinning on a modern turntable in warm colors." src="https://images.unsplash.com/photo-1539628390771-e39a5180cb00?auto=format&fit=crop&w=800&q=80">
      </div>

      <!-- Welcome Text -->
      <div class="text-section">
        <h1>Your music, blended.</h1>
        <p class="subtext">Experience sound in its purest form. High fidelity streaming for the modern ear.</p>
      </div>
    </main>

    <!-- Action Buttons -->
    <div class="actions-section">
      <button class="btn btn-primary" onclick="location.href='../0.2_sign_up/code.html'">Sign Up</button>
      <button class="btn btn-secondary" onclick="location.href='../0.1_sign_in/code.html'">Sign In</button>
      <p class="disclaimer">
        By continuing, you agree to our <span class="underline">Terms of Service</span> and <span class="underline">Privacy Policy</span>.
      </p>
    </div>
  </div>

</body>
</html>
