<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Blend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 64px; /* bottom nav */
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(250, 248, 246, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-7);
      flex-grow: 1;
      justify-content: center;
    }

    /* Abstract Bento Scanning visualizer */
    .bento-scan-grid {
      position: relative;
      width: 240px;
      height: 240px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: var(--sp-1);
    }

    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--color-primary);
      box-shadow: 0 0 8px var(--color-primary);
      z-index: 20;
      opacity: 0.8;
      animation: scanVertical 3s ease-in-out infinite;
    }

    @keyframes scanVertical {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    .grid-cell {
      border: 1px solid var(--color-border-soft);
      background-color: var(--color-surface-2);
      border-radius: var(--r-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-4);
      transition: background-color 300ms ease;
    }

    .grid-cell.active-shimmer {
      animation: cellShimmer 2s infinite alternate;
    }

    @keyframes cellShimmer {
      0% { background-color: var(--color-surface-2); }
      100% { background-color: var(--color-surface-3); }
    }

    .grid-cell svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      opacity: 0.5;
    }

    /* Cell coordinates */
    .c1 { grid-column: span 3; grid-row: span 3; background-color: var(--color-surface-3); }
    .c2 { grid-column: span 3; grid-row: span 2; }
    .c3 { grid-column: span 2; grid-row: span 3; }
    .c4 { grid-column: span 1; grid-row: span 1; }
    .c5 { grid-column: span 3; grid-row: span 1; }
    .c6 { grid-column: span 4; grid-row: span 2; }
    .c7 { grid-column: span 2; grid-row: span 1; }

    .c1 svg { width: 32px; height: 32px; }

    /* Texts */
    .text-center {
      text-align: center;
      max-width: 320px;
    }

    .text-center h2 {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      margin-bottom: var(--sp-2);
    }

    .text-center p {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    /* Progress bar wrapper */
    .progress-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: var(--color-surface-3);
      border-radius: var(--r-full);
      overflow: hidden;
      border: 1px solid var(--color-border-soft);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--grad-chrome);
      border-radius: var(--r-full);
      transition: width 150ms linear;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-text {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      text-transform: uppercase;
      letter-spacing: var(--ls-widest);
      color: var(--color-ink-3);
    }

    .percentage-text {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      color: var(--color-ink-2);
    }

    /* Dimmed Bottom Navigation */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: var(--color-surface-2);
      border-top: 1px solid var(--color-border-soft);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
      opacity: 0.5;
      pointer-events: none; /* disable clicks */
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="mobile-container">
    <!-- Header -->
    <header>
      <button class="back-btn" onclick="location.href='../7._friend_accepts/code.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="header-title">Now Playing</div>
      <button class="more-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Abstract scanning visual grid -->
      <div class="bento-scan-grid">
        <div class="scan-line"></div>
        <div class="grid-cell c1 active-shimmer">
          <svg viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
        </div>
        <div class="grid-cell c2">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
        </div>
        <div class="grid-cell c3 active-shimmer">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="grid-cell c4"></div>
        <div class="grid-cell c5"></div>
        <div class="grid-cell c6">
          <div style="display: flex; gap: 4px;">
            <div style="width:6px; height:6px; border-radius:50%; background:currentColor;"></div>
            <div style="width:6px; height:6px; border-radius:50%; background:currentColor;"></div>
            <div style="width:6px; height:6px; border-radius:50%; background:currentColor;"></div>
          </div>
        </div>
        <div class="grid-cell c7"></div>
      </div>

      <!-- Text Section -->
      <div class="text-center">
        <h2>Creating your Blend...</h2>
        <p>Analyzing listening histories to find your shared favorites.</p>
      </div>

      <!-- Progress bar section -->
      <div class="progress-wrapper">
        <div class="progress-bar-container">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-labels">
          <span class="status-text" id="statusText">Syncing Profiles</span>
          <span class="percentage-text" id="percentText">0%</span>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation Bar (Dimmed) -->
    <nav class="bottom-nav">
      <div class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span>Home</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>Search</span>
      </div>
      <div class="nav-item active">
        <span class="nav-active-pill">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
          <span>Library</span>
        </span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        <span>Premium</span>
      </div>
    </nav>
  </div>

  <script>
    const statuses = [
      'Syncing Profiles',
      'Matching Beats',
      'Calculating Overlap',
      'Finding Deep Cuts',
      'Generating Flow',
      'Polishing Blend'
    ];

    let currentPercent = 0;
    const fillEl = document.getElementById('progressFill');
    const percentEl = document.getElementById('percentText');
    const statusEl = document.getElementById('statusText');

    function animateProgress() {
      if (currentPercent < 100) {
        currentPercent += 1.5;
        if (currentPercent > 100) currentPercent = 100;

        fillEl.style.width = currentPercent + '%';
        percentEl.innerText = Math.floor(currentPercent) + '%';

        // Update status text based on percentage
        const statusIdx = Math.floor((currentPercent / 100) * statuses.length);
        if (statuses[statusIdx] && statusEl.innerText !== statuses[statusIdx]) {
          statusEl.innerText = statuses[statusIdx];
        }

        setTimeout(animateProgress, 50);
      } else {
        // Redirect to exceptional match screen once complete
        setTimeout(() => {
          location.href = '../11._music_taste_match/code.html?from=creation';
        }, 800);
      }
    }

    // Start loading animation after a short delay
    setTimeout(animateProgress, 600);
  </script>
</body>
</html>
