<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library with Blend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: transparent;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 140px; /* bottom nav + mini player */
      height: 100vh;
      overflow-y: auto;
    }

    header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px) saturate(120%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
      -webkit-backdrop-filter: blur(24px) saturate(120%);
    }

    .profile-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-3);
    }

    .profile-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .action-icons {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    .header-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .header-icon-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      flex: 1;
      margin-left: var(--sp-3);
    }

    main {
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    /* Filter chips */
    .filter-chips-row {
      display: flex;
      gap: var(--sp-2);
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-chips-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      padding: 8px 16px;
      border-radius: var(--r-full);
      border: 1px solid var(--color-border);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      color: var(--color-ink-3);
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 150ms var(--ease-out), color 150ms var(--ease-out);
    }

    .chip.active {
      background-color: var(--color-primary);
      color: var(--color-bg);
      border-color: var(--color-primary);
    }

    /* Sort bar */
    .sort-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 var(--sp-1);
    }

    .sort-btn {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: var(--fs-xs);
      color: var(--color-ink-3);
      cursor: pointer;
      background: transparent;
      border: none;
    }

    .sort-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .view-btn {
      color: var(--color-ink-3);
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--r-full);
    }

    .view-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    /* Library list rows */
    .library-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .library-item {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-2) var(--sp-1);
      cursor: pointer;
      border-radius: var(--r-md);
      text-decoration: none;
      color: inherit;
      transition: background-color 150ms var(--ease-out);
    }

    .library-item:hover {
      background-color: var(--color-surface-2);
    }

    /* Custom Blend Artwork with Overlay Avatars */
    .blend-art-box {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, var(--color-surface-3) 0%, var(--color-border) 100%);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .blend-art-box svg.wave-art {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.25;
      color: var(--color-ink);
    }

    .blend-art-icon {
      font-size: 28px;
      color: var(--color-ink-3);
      z-index: 1;
    }

    .participant-avatars {
      position: absolute;
      bottom: 4px;
      right: 4px;
      display: flex;
      margin-left: -6px;
      z-index: 2;
    }

    .part-avatar {
      width: 22px;
      height: 22px;
      border-radius: var(--r-full);
      border: 1.5px solid var(--color-surface);
      overflow: hidden;
      background-color: var(--color-surface-3);
    }

    .part-avatar:not(:first-child) {
      margin-left: -8px;
    }

    .part-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Standard Art Box */
    .standard-art-box {
      width: 64px;
      height: 64px;
      border-radius: var(--r-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .art-liked {
      background-color: var(--color-ink);
      color: var(--color-bg);
    }

    .art-liked svg {
      width: 28px;
      height: 28px;
      fill: var(--color-primary-soft);
      stroke: var(--color-primary-deep);
      stroke-width: 1.5;
    }

    .art-episodes {
      background-color: var(--color-surface-3);
      border: 1px solid var(--color-border);
      color: var(--color-primary-deep);
    }

    .art-episodes svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .art-playlist {
      border: 1px solid var(--color-border);
      overflow: hidden;
    }

    .art-playlist img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      mix-blend-mode: multiply;
    }

    .item-details {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: var(--fs-xs);
      color: var(--color-ink-3);
      margin-top: 2px;
    }

    .item-meta svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Fixed Mini Player above Bottom Nav */
    .mini-player {
      position: fixed;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - var(--sp-4));
      max-width: calc(430px - var(--sp-4));
      height: 52px;
      background-color: var(--color-ink);
      border-radius: var(--r-md);
      padding: var(--sp-2) var(--sp-3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--sh-md);
      z-index: 99;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }

    .mini-left {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      min-width: 0;
      flex: 1;
    }

    .mini-art {
      width: 36px;
      height: 36px;
      border-radius: var(--r-xs);
      overflow: hidden;
      background: var(--grad-chrome-soft);
      flex-shrink: 0;
    }

    .mini-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      mix-blend-mode: multiply;
    }

    .mini-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .mini-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-artist {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
    }

    .mini-right {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .mini-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    .mini-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
    }

    /* Small bottom progress bar inside player */
    .mini-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 0 0 var(--r-md) var(--r-md);
      overflow: hidden;
    }

    .mini-progress-fill {
      height: 100%;
      width: 37%;
      background-color: var(--color-primary);
    }

    /* Fixed Bottom Navigation (Library active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-bottom: none;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
    
      backdrop-filter: blur(5px) saturate(120%);
      -webkit-backdrop-filter: blur(5px) saturate(120%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 32px rgba(31, 27, 22, 0.06);}

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
      transition: color 150ms var(--ease-out);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item:hover {
      color: var(--color-ink);
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  
    /* Dynamic Animated Gradient Background with Noise */
    .dynamic-bg-container {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* Stacking context fix to bring content above absolute background */
    .mobile-container > *:not(.dynamic-bg-container):not(header):not(nav):not(.toast):not(.fab):not(.mini-player) {
      position: relative;
      z-index: 1;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: blur(60px);
      opacity: 0.95;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #C98B86;
      animation: move-1 16s infinite ease-in-out;
    }

    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #D9A86A;
      animation: move-2 18s infinite ease-in-out;
    }

    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 14s infinite ease-in-out;
    }

    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFF8D4;
      animation: move-4 15s infinite ease-in-out;
    }

    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #D9A86A;
      animation: move-5 17s infinite ease-in-out;
    }

    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #ffb672;
      animation: move-6 16s infinite ease-in-out;
    }

    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-140px, 180px) scale(1.2); }
      66% { transform: translate(-40px, 240px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-180px, -140px) scale(0.85); }
      66% { transform: translate(-90px, -240px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(160px, 120px) scale(1.25); }
      66% { transform: translate(240px, 40px) scale(0.8); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(190px, 150px) scale(0.8); }
      66% { transform: translate(120px, -80px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(180px, -180px) scale(1.3); }
      66% { transform: translate(250px, -90px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(0.85); }
      66% { transform: translate(-220px, -40px) scale(1.25); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

</style>
</head>
<body>

  <div class="mobile-container">
    <!-- Dynamic background wrapper -->
    <div class="dynamic-bg-container">
      <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
      </div>
      <!-- Grain/Noise Overlay -->
      <div class="noise-overlay"></div>
    </div>
    <!-- Header -->
    <header>
      <div class="profile-btn">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="header-title">Your Library</div>
      <div class="action-icons">
        <button class="header-icon-btn">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="header-icon-btn" onclick="location.href='../3._create_menu/code.html'">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Scrollable Filter Chips -->
      <section class="filter-chips-row">
        <span class="chip active">Playlists</span>
        <span class="chip">Artists</span>
        <span class="chip">Albums</span>
        <span class="chip">Podcasts</span>
      </section>

      <!-- Sorting row -->
      <section class="sort-bar">
        <button class="sort-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="15 3 21 9 17 9"></polyline>
            <polyline points="9 21 3 15 7 15"></polyline>
            <line x1="21" y1="9" x2="9" y2="9"></line>
