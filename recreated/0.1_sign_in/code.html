<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Liquid chrome gradient */
      --grad-chrome: linear-gradient(135deg, #C98B86 0%, #A89BC2 35%, #8AA68E 70%, #E2A87F 100%);
      --grad-chrome-soft: linear-gradient(135deg, #F4DAD6 0%, #E5DEF0 35%, #DCE7DE 70%, #F6E0CE 100%);

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: transparent;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* for header */
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px) saturate(120%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
      -webkit-backdrop-filter: blur(24px) saturate(120%);
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .welcome-intro {
      margin-bottom: var(--sp-7);
    }

    .welcome-intro h2 {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      margin-bottom: var(--sp-2);
    }

    .welcome-intro p {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .label-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      text-transform: uppercase;
      letter-spacing: var(--ls-wide);
      color: var(--color-ink-3);
    }

    .link-forgot {
      font-size: var(--fs-xs);
      color: #8E4A44;
      text-decoration: underline;
      font-weight: var(--fw-semibold);
      background: none;
      border: none;
      cursor: pointer;
    }

    .link-forgot:hover {
      text-decoration: underline;
    }

    .input-field {
      width: 100%;
      height: 48px;
      padding: var(--sp-3) var(--sp-4);
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      color: var(--color-ink);
      transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
      outline: none;
    }

    .input-field:hover {
      border-color: var(--color-ink-4);
    }

    .input-field:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-tint);
    }

    .btn {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), background 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--grad-chrome);
      color: var(--color-bg);
      box-shadow: var(--sh-sm);
      margin-top: var(--sp-3);
    }

    .btn-primary:hover {
      opacity: 0.9;
      box-shadow: var(--sh-md);
    }

    .divider-container {
      display: flex;
      align-items: center;
      margin: var(--sp-7) 0;
    }

    .divider-line {
      flex-grow: 1;
      height: 1px;
      background-color: var(--color-border-soft);
    }

    .divider-text {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      color: var(--color-ink-4);
      letter-spacing: var(--ls-widest);
      margin: 0 var(--sp-4);
      text-transform: uppercase;
    }

    .social-container {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .btn-social {
      background-color: var(--color-surface);
      color: var(--color-ink-2);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-3);
    }

    .btn-social:hover {
      background-color: var(--color-surface-3);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .footer-section {
      text-align: center;
      margin-top: auto;
      padding-top: var(--sp-7);
    }

    .footer-text {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
    }

    .footer-text button {
      background: none;
      border: none;
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      cursor: pointer;
      text-decoration: underline;
    }

    .bg-visual-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 256px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }

    .bg-visual-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  
    /* Dynamic Animated Gradient Background with Noise */
    .dynamic-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* Stacking context fix to bring content above absolute background */
    .mobile-container > *:not(.dynamic-bg-container):not(header):not(nav):not(.toast):not(.fab) {
      position: relative;
      z-index: 1;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: blur(60px);
      opacity: 0.95;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #C98B86;
      animation: move-1 16s infinite ease-in-out;
    }

    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #D9A86A;
      animation: move-2 18s infinite ease-in-out;
    }

    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 14s infinite ease-in-out;
    }

    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFF8D4;
      animation: move-4 15s infinite ease-in-out;
    }

    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #D9A86A;
      animation: move-5 17s infinite ease-in-out;
    }

    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #ffb672;
      animation: move-6 16s infinite ease-in-out;
    }

    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-140px, 180px) scale(1.2); }
      66% { transform: translate(-40px, 240px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-180px, -140px) scale(0.85); }
      66% { transform: translate(-90px, -240px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(160px, 120px) scale(1.25); }
      66% { transform: translate(240px, 40px) scale(0.8); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(190px, 150px) scale(0.8); }
      66% { transform: translate(120px, -80px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(180px, -180px) scale(1.3); }
      66% { transform: translate(250px, -90px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(0.85); }
      66% { transform: translate(-220px, -40px) scale(1.25); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

</style>
</head>
<body>

  <div class="mobile-container">
    <!-- Dynamic background wrapper -->
    <div class="dynamic-bg-container">
      <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
      </div>
      <!-- Grain/Noise Overlay -->
      <div class="noise-overlay"></div>
    </div>
    <!-- Header -->
    <header>
      <button class="back-btn" onclick="location.href='../0._welcome/code.html'">
        <!-- SVG Left Arrow -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="header-title">Sign In</div>
      <div style="width: 36px;"></div> <!-- visual spacer -->
    </header>

    <!-- Main Content -->
    <main>
      <!-- Intro Section -->
      <section class="welcome-intro">
        <h2>Welcome back</h2>
        <p>Please enter your credentials to access your account.</p>
      </section>

      <!-- Form -->
      <form onsubmit="return false;">
        <div class="field-group">
          <label for="email">Email</label>
          <input class="input-field" type="email" id="email" placeholder="name@example.com">
        </div>

        <div class="field-group">
          <div class="label-wrapper">
            <label for="password">Password</label>
            <button class="link-forgot" type="button">Forgot Password?</button>
          </div>
          <input class="input-field" type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" type="submit" onclick="location.href='../1._home/code.html'">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="divider-container">
        <div class="divider-line"></div>
        <div class="divider-text">OR CONTINUE WITH</div>
        <div class="divider-line"></div>
      </div>

      <!-- Social Logins -->
      <div class="social-container">
        <button class="btn btn-social">
          <!-- Circle/Google placeholder SVG -->
          <svg viewBox="0 0 24 24">
            <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.535 0-6.403-2.868-6.403-6.403s2.868-6.403 6.403-6.403c1.558 0 2.978.558 4.09 1.487l3.078-3.078C19.123 2.33 15.932 1 12.24 1 5.922 1 1 5.922 1 12s4.922 11 11.24 11c6.59 0 11.24-4.633 11.24-11.24 0-.756-.09-1.485-.24-2.215H12.24z"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button class="btn btn-social">
          <!-- Apple Placeholder SVG -->
          <svg viewBox="0 0 24 24">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.12.09 2.27-.58 2.94-1.39z"/>
          </svg>
          <span>Continue with Apple</span>
        </button>
      </div>

      <!-- Footer -->
      <footer class="footer-section">
        <p class="footer-text">
          Don't have an account? 
          <button type="button" onclick="location.href='../0.2_sign_up/code.html'">Sign up for free</button>
        </p>
      </footer>
    </main>

    <!-- Optional Atmospheric element -->
    <div class="bg-visual-container">
      <img class="bg-visual-img" data-alt="A subtle, minimalist colored abstract background featuring soft fluid curves and elegant geometric gradients." src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80">
    </div>
  </div>

</body>
</html>
