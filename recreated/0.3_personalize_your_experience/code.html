<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tell us what you love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-2xl: 28px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* for header */
      padding-bottom: 120px; /* space for fixed footer */
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(250, 248, 246, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5);
      display: flex;
      flex-direction: column;
    }

    .intro-section {
      margin-bottom: var(--sp-5);
    }

    .intro-section h2 {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      margin-bottom: var(--sp-2);
    }

    .intro-section p {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    .search-wrapper {
      position: relative;
      margin-bottom: var(--sp-6);
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      color: var(--color-ink-4);
      pointer-events: none;
      width: 18px;
      height: 18px;
    }

    .search-input {
      width: 100%;
      height: 48px;
      padding: var(--sp-3) var(--sp-4) var(--sp-3) 44px;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      color: var(--color-ink);
      transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-tint);
    }

    .grid-tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-4);
    }

    .tile {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-xl);
      padding: var(--sp-5) var(--sp-4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
      aspect-ratio: 1;
      transition: background-color 150ms var(--ease-out), border-color 150ms var(--ease-out), color 150ms var(--ease-out), transform 150ms var(--ease-out);
    }

    .tile:active {
      transform: scale(0.96);
    }

    .tile-icon-circle {
      width: 48px;
      height: 48px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--sp-3);
      color: var(--color-ink-3);
      transition: background-color 150ms var(--ease-out), color 150ms var(--ease-out);
    }

    .tile-label {
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      letter-spacing: var(--ls-wide);
    }

    /* Selected Tile State */
    .tile.selected {
      background-color: var(--color-ink);
      border-color: var(--color-ink);
      color: var(--color-surface);
    }

    .tile.selected .tile-icon-circle {
      background-color: rgba(255, 255, 255, 0.15);
      color: var(--color-surface);
    }

    /* Footer actions */
    footer.fixed-bottom {
      position: fixed;
      bottom: 0;
      max-width: 430px;
      width: 100%;
      background-color: var(--color-surface);
      border-top: 1px solid var(--color-border-soft);
      padding: var(--sp-4) var(--sp-5) var(--sp-6);
      z-index: 90;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .counter-text {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      text-transform: uppercase;
      letter-spacing: var(--ls-wide);
      color: var(--color-ink-3);
    }

    .btn-skip {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    .btn-skip:hover {
      color: var(--color-primary-deep);
    }

    .btn-continue {
      width: 100%;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: not-allowed;
      background-color: var(--color-border);
      color: var(--color-ink-4);
      transition: background-color 150ms var(--ease-out), color 150ms var(--ease-out), transform 150ms var(--ease-out);
    }

    .btn-continue.active {
      cursor: pointer;
      background-color: var(--color-primary);
      color: var(--color-bg);
    }

    .btn-continue.active:active {
      transform: scale(0.98);
    }

    .btn-continue svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>

  <div class="mobile-container">
    <!-- Header -->
    <header>
      <button class="back-btn" onclick="location.href='../0.2_sign_up/code.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="header-title">Create Account</div>
      <button class="more-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Title Section -->
      <section class="intro-section">
        <h2>Tell us what you love</h2>
        <p>Select at least 3 genres or artists to personalize your soundtrack. Your feed will adapt to your taste.</p>
      </section>

      <!-- Search Bar -->
      <div class="search-wrapper">
        <!-- SVG magnifying glass -->
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" type="text" placeholder="Search genres or artists...">
      </div>

      <!-- Preference Grid -->
      <div class="grid-tiles">
        <!-- Tile 1 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
          </div>
          <span class="tile-label">Techno</span>
        </div>

        <!-- Tile 2 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="2" y="3" width="20" height="18" rx="2" ry="2"></rect>
              <line x1="6" y1="3" x2="6" y2="21"></line>
              <line x1="10" y1="3" x2="10" y2="21"></line>
              <line x1="14" y1="3" x2="14" y2="21"></line>
              <line x1="18" y1="3" x2="18" y2="21"></line>
            </svg>
          </div>
          <span class="tile-label">Classical</span>
        </div>

        <!-- Tile 3 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Guitar / Rock placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M18 2l3 3"></path>
              <path d="M14 6l6 6"></path>
              <path d="M2 22l8-8"></path>
              <circle cx="14" cy="10" r="4"></circle>
            </svg>
          </div>
          <span class="tile-label">Rock</span>
        </div>

        <!-- Tile 4 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Mic / Hip Hop placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
          </div>
          <span class="tile-label">Hip Hop</span>
        </div>

        <!-- Tile 5 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Sax / Jazz placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2c0 2-2 4-4 4"></path>
              <circle cx="6" cy="18" r="4"></circle>
              <path d="M10 18V8c0-2.2 1.8-4 4-4h4"></path>
            </svg>
          </div>
          <span class="tile-label">Jazz</span>
        </div>

        <!-- Tile 6 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Speaker / Ambient placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="4" y="2" width="14" height="20" rx="2" ry="2"></rect>
              <circle cx="11" cy="8" r="2"></circle>
              <circle cx="11" cy="16" r="4"></circle>
            </svg>
          </div>
          <span class="tile-label">Ambient</span>
        </div>

        <!-- Tile 7 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Graphic EQ / Electronic placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <line x1="4" y1="20" x2="4" y2="10"></line>
              <line x1="4" y1="6" x2="4" y2="4"></line>
              <line x1="9" y1="20" x2="9" y2="14"></line>
              <line x1="9" y1="10" x2="9" y2="4"></line>
              <line x1="14" y1="20" x2="14" y2="12"></line>
              <line x1="14" y1="8" x2="14" y2="4"></line>
              <line x1="19" y1="20" x2="19" y2="16"></line>
              <line x1="19" y1="12" x2="19" y2="4"></line>
            </svg>
          </div>
          <span class="tile-label">Electronic</span>
        </div>

        <!-- Tile 8 -->
        <div class="tile" onclick="toggleSelection(this)">
          <div class="tile-icon-circle">
            <!-- Disc / Indie placeholder SVG -->
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="2"></circle>
            </svg>
          </div>
          <span class="tile-label">Indie</span>
        </div>
      </div>
    </main>

    <!-- Bottom Actions Area -->
    <footer class="fixed-bottom">
      <div class="footer-row">
        <span class="counter-text" id="selection-counter">0 selected</span>
        <button class="btn-skip" onclick="location.href='../1._home/code.html'">Skip</button>
      </div>
      <button class="btn-continue" id="continue-btn" disabled onclick="location.href='../1._home/code.html'">
        <span>Continue</span>
        <svg viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </footer>
  </div>

  <script>
    let selectedCount = 0;
    const minSelections = 3;

    function toggleSelection(element) {
      element.classList.toggle('selected');
      if (element.classList.contains('selected')) {
        selectedCount++;
      } else {
        selectedCount--;
      }
      
      // Update UI Counter
      document.getElementById('selection-counter').innerText = `${selectedCount} selected`;

      // Update Continue Button State
      const continueBtn = document.getElementById('continue-btn');
      if (selectedCount >= minSelections) {
        continueBtn.disabled = false;
        continueBtn.classList.add('active');
      } else {
        continueBtn.disabled = true;
        continueBtn.classList.remove('active');
      }
    }
  </script>
</body>
</html>
