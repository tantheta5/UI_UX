<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing - Download Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: transparent;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 96px; /* header + banner */
      padding-bottom: 64px; /* bottom nav */
      height: 100vh;
      overflow-y: auto;
    }

    header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px) saturate(120%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
      -webkit-backdrop-filter: blur(24px) saturate(120%);
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    /* Sub-banner styling */
    .download-banner {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 40px;
      background-color: var(--color-ink);
      color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--sp-4);
      z-index: 99;
      box-shadow: var(--sh-sm);
    }

    .banner-left {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-bg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    .banner-cancel {
      background: transparent;
      border: none;
      color: var(--color-primary-soft);
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      cursor: pointer;
      text-decoration: underline;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Main Content */
    main {
      padding: var(--sp-5) var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-6);
    }

    /* Playlist header grid */
    .playlist-header-sec {
      display: flex;
      gap: var(--sp-4);
      align-items: flex-end;
    
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);}

    .artwork-box {
      width: 112px;
      height: 112px;
      border-radius: var(--r-lg);
      overflow: hidden;
      border: 1px solid var(--color-border);
      background: var(--grad-chrome-soft);
      flex-shrink: 0;
    }

    .artwork-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      mix-blend-mode: multiply;
    }

    .playlist-info {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .playlist-title {
      font-family: var(--font-serif);
      font-size: var(--fs-lg);
      font-weight: var(--fw-bold);
      color: var(--color-ink);
      line-height: var(--lh-tight);
      margin-bottom: 2px;
    }

    .playlist-stats {
      font-size: var(--fs-xs);
      color: var(--color-ink-3);
      margin-bottom: var(--sp-3);
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    /* Circle progress ring */
    .progress-ring-box {
      position: relative;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-surface-3);
      border-radius: var(--r-full);
      color: var(--color-primary-deep);
    }

    .progress-ring-box svg {
      position: absolute;
      inset: 0;
    }

    .progress-ring-box svg circle.track {
      stroke: var(--color-border-soft);
    }

    .progress-ring-box svg circle.fill {
      stroke: var(--color-primary);
      stroke-dasharray: 100.5;
      stroke-dashoffset: 35;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 18px 18px;
      transition: stroke-dashoffset 200ms ease;
    }

    .progress-ring-box svg.ring-svg {
      width: 36px;
      height: 36px;
    }

    .progress-ring-box .center-icon {
      font-size: 14px;
      z-index: 2;
    }

    .btn-share-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      border: 1px solid var(--color-border);
      background-color: var(--color-surface);
      color: var(--color-ink-3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 150ms var(--ease-out);
    }

    .btn-share-icon:hover {
      background-color: var(--color-surface-2);
    }

    .btn-share-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .btn-play {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      padding: 8px 20px;
      background-color: var(--color-primary);
      color: var(--color-bg);
      font-family: var(--font-sans);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: none;
      cursor: pointer;
      box-shadow: var(--sh-sm);
      transition: background-color 150ms var(--ease-out);
    }

    .btn-play:hover {
      background-color: var(--color-primary-deep);
    }

    .btn-play svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Track List */
    .tracks-section {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .track-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-4);
      background-color: var(--color-surface-2);
      border: 1px solid var(--color-border-soft);
      border-radius: var(--r-xl);
      cursor: pointer;
      transition: background-color 150ms var(--ease-out);
    }

    .track-card:hover {
      background-color: var(--color-surface-3);
    }

    .track-card.pending {
      opacity: 0.65;
    }

    .track-left {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      min-width: 0;
    }

    .track-num {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      color: var(--color-ink-4);
      width: 16px;
    }

    .track-details {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .track-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: var(--fs-xs);
      color: var(--color-ink-3);
      margin-top: 1px;
    }

    .track-right {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      color: var(--color-ink-3);
    }

    .track-status-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .track-status-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .track-status-icon.downloaded {
      color: var(--color-primary-deep);
    }

    .track-status-icon.downloaded svg {
      fill: var(--color-primary-soft);
      stroke: var(--color-primary-deep);
    }

    .track-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    /* Fixed Bottom Navigation (Library active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-bottom: none;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
    
      backdrop-filter: blur(5px) saturate(120%);
      -webkit-backdrop-filter: blur(5px) saturate(120%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 32px rgba(31, 27, 22, 0.06);}

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
      transition: color 150ms var(--ease-out);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item:hover {
      color: var(--color-ink);
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  
    /* Dynamic Animated Gradient Background with Noise */
    .dynamic-bg-container {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* Stacking context fix to bring content above absolute background */
    .mobile-container > *:not(.dynamic-bg-container):not(header):not(nav):not(.toast):not(.fab):not(.download-banner) {
      position: relative;
      z-index: 1;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: blur(60px);
      opacity: 0.95;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #C98B86;
      animation: move-1 16s infinite ease-in-out;
    }

    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #D9A86A;
      animation: move-2 18s infinite ease-in-out;
    }

    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 14s infinite ease-in-out;
    }

    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFF8D4;
      animation: move-4 15s infinite ease-in-out;
    }

    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #D9A86A;
      animation: move-5 17s infinite ease-in-out;
    }

    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #ffb672;
      animation: move-6 16s infinite ease-in-out;
    }

    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-140px, 180px) scale(1.2); }
      66% { transform: translate(-40px, 240px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-180px, -140px) scale(0.85); }
      66% { transform: translate(-90px, -240px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(160px, 120px) scale(1.25); }
      66% { transform: translate(240px, 40px) scale(0.8); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(190px, 150px) scale(0.8); }
      66% { transform: translate(120px, -80px) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(180px, -180px) scale(1.3); }
      66% { transform: translate(250px, -90px) scale(0.85); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(0.85); }
      66% { transform: translate(-220px, -40px) scale(1.25); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

</style>
</head>
<body>

  <div class="mobile-container">
    <!-- Dynamic background wrapper -->
    <div class="dynamic-bg-container">
      <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
      </div>
      <!-- Grain/Noise Overlay -->
      <div class="noise-overlay"></div>
    </div>
    <!-- Header -->
    <header>
      <div class="flex items-center gap-2">
        <button class="back-btn" onclick="location.href='../10._blend_playlist/code.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="header-title">Playlist</div>
      </div>
      <button class="more-btn" onclick="location.href='../18._blend_settings/code.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </header>

    <!-- Download Progress Banner -->
    <div class="download-banner">
      <div class="banner-left">
        <div class="spinner"></div>
        <span>Downloading 50 tracks...</span>
      </div>
      <button class="banner-cancel" onclick="location.href='../10._blend_playlist/code.html'">Cancel</button>
    </div>

    <!-- Main Content -->
    <main>
      <!-- Playlist Meta Header -->
      <section class="playlist-header-sec">
        <div class="artwork-box">
          <img data-alt="Vibrant workout energy illustration in color." src="https://images.unsplash.com/photo-1517838277536-f5f99be501cd?auto=format&fit=crop&w=300&q=80">
        </div>
        <div class="playlist-info">
          <h2 class="playlist-title">Workout Energy</h2>
          <span class="playlist-stats">50 tracks • 2 hrs 45 mins</span>
          
          <div class="action-row">
            <!-- Animated Progress Ring -->
            <div class="progress-ring-box">
              <svg class="ring-svg">
                <circle class="track" cx="18" cy="18" r="14" fill="transparent" stroke-width="3" />
                <circle class="fill" id="ringFill" cx="18" cy="18" r="14" fill="transparent" stroke-width="3" />
              </svg>
              <!-- Small arrow inside -->
              <span class="center-icon">⬇</span>
            </div>

            <button class="btn-share-icon" onclick="location.href='../13._share_blend/code.html'">
              <svg viewBox="0 0 24 24">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
              </svg>
            </button>

            <button class="btn-play" onclick="location.href='../13._now_playing/code.html'">
              <svg viewBox="0 0 24 24">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              <span>Play</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Track List -->
      <section class="tracks-section">
        <!-- Track 1: Downloaded -->
        <div class="track-card">
          <div class="track-left">
            <span class="track-num">1</span>
            <div class="track-details">
              <span class="track-title">Thunderstruck</span>
              <span class="track-artist">AC/DC</span>
            </div>
          </div>
          <div class="track-right">

  <script>
    // Simulate circular progress loader
    let progress = 65; // Start at 65% as per original markup
    const ringFill = document.getElementById('ringFill');
    const radius = 14;
    const circumference = radius * 2 * Math.PI;

    ringFill.style.strokeDasharray = `${circumference} ${circumference}`;

    function updateProgress() {
      const offset = circumference - (progress / 100) * circumference;
      ringFill.style.strokeDashoffset = offset;
    }

    updateProgress();

    // Fill up the progress bar to 100% and auto-redirect to updated library list
    const interval = setInterval(() => {
      if (progress < 100) {
        progress += 5;
        if (progress > 100) progress = 100;
        updateProgress();
      } else {
        clearInterval(interval);
        // Completed download, redirect to library screen containing the active blend
        setTimeout(() => {
          location.href = '../15._library_updated/code.html';
        }, 1000);
      }
    }, 450);
  </script>
