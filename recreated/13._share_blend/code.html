<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Blend - Now Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 64px; /* bottom nav */
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0;
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(250, 248, 246, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 10;
      justify-content: space-between;
      opacity: 0.5; /* Under modal */
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    /* Main background content (Now Playing) */
    .bg-main {
      padding: var(--sp-6) var(--sp-5) var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
      flex: 1;
      opacity: 0.4; /* Under modal */
      pointer-events: none;
    }

    .artwork-container {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--color-border);
      background: var(--grad-chrome-soft);
    }

    .artwork-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      mix-blend-mode: multiply;
    }

    /* Scrim overlay */
    .scrim {
      position: absolute;
      inset: 0;
      background-color: rgba(31, 27, 22, 0.4);
      backdrop-filter: blur(2px);
      z-index: 50;
      cursor: pointer;
    }

    /* Bottom Sheet slide up */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--color-surface);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: var(--sp-5);
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
      box-shadow: var(--sh-lg);
      transform: translateY(0);
      transition: transform 300ms var(--ease-out);
    }

    .drag-handle-wrapper {
      display: flex;
      justify-content: center;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background-color: var(--color-border);
      border-radius: var(--r-full);
    }

    .sheet-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sheet-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    .sheet-desc {
      font-size: var(--fs-xs);
      color: var(--color-ink-3);
    }

    /* Bento Grid Destinations */
    .destinations-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-2);
    }

    .dest-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-1);
      background-color: var(--color-surface-2);
      border: 1px solid var(--color-border-soft);
      border-radius: var(--r-lg);
      cursor: pointer;
      transition: background-color 150ms var(--ease-out), transform 150ms var(--ease-out);
      border: 1px solid var(--color-border-soft);
    }

    .dest-btn:hover {
      background-color: var(--color-surface-3);
      transform: translateY(-2px);
    }

    .dest-btn:active {
      transform: scale(0.95);
    }

    .dest-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background-color: var(--color-surface);
      border: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink);
    }

    .dest-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
    }

    .dest-label {
      font-size: 11px;
      font-weight: var(--fw-medium);
      color: var(--color-ink-3);
    }

    /* Preview Song Card */
    .preview-card {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3);
      background-color: var(--color-surface-3);
      border: 1px solid var(--color-border-soft);
      border-radius: var(--r-lg);
    }

    .preview-media {
      width: 48px;
      height: 48px;
      border-radius: var(--r-xs);
      overflow: hidden;
      background: var(--grad-chrome-soft);
      flex-shrink: 0;
    }

    .preview-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      mix-blend-mode: multiply;
    }

    .preview-info {
      display: flex;
      flex-direction: column;
      flex-1: min-w-0;
    }

    .preview-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-link {
      font-size: var(--fs-xs);
      color: var(--color-primary-deep);
      margin-top: 1px;
      font-family: var(--font-mono);
    }

    /* Bottom buttons */
    .actions-box {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .btn-primary {
      width: 100%;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      background-color: var(--color-primary);
      color: var(--color-bg);
      border: none;
      cursor: pointer;
      box-shadow: var(--sh-sm);
      transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-deep);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .btn-secondary {
      width: 100%;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      background-color: var(--color-surface);
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      cursor: pointer;
      transition: background-color 150ms var(--ease-out);
    }

    .btn-secondary:hover {
      background-color: var(--color-surface-3);
    }

    /* Fixed Bottom Navigation (Library active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: var(--color-surface-2);
      border-top: 1px solid var(--color-border-soft);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 10;
      padding: 0 var(--sp-4);
      opacity: 0.5; /* Under modal */
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Toast Notification */
    .toast-overlay {
      position: absolute;
      top: var(--sp-6);
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--color-ink);
      color: var(--color-bg);
      padding: var(--sp-2) var(--sp-5);
      border-radius: var(--r-full);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      box-shadow: var(--sh-md);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms var(--ease-out);
    }

    .toast-overlay.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="mobile-container">
    <!-- Header -->

      <!-- Actions -->

            <circle cx="6" cy="12" r="3"></circle>

        <button class="btn-secondary" onclick="location.href='../13._now_playing/code.html'">

    <!-- Fixed Bottom Navigation (Library active) -->
    <nav class="bottom-nav">
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">

  <script>
    function copyLink() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        location.href = '../17._daily_refresh/code.html';
      }, 1500);
    }
  </script>
