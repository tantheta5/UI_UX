<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Sent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 64px; /* bottom nav */
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(250, 248, 246, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-6);
      flex-grow: 1;
      justify-content: center;
    }

    /* Central spinner visualizer */
    .visualizer-wrapper {
      position: relative;
      width: 176px;
      height: 176px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--sp-2);
    }

    .spinner-track {
      position: absolute;
      inset: 0;
      border: 4px solid var(--color-border-soft);
      border-radius: var(--r-full);
    }

    .spinner-ring {
      position: absolute;
      inset: 0;
      border: 4px solid var(--color-primary);
      border-top-color: transparent;
      border-radius: var(--r-full);
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .core-circle {
      width: 112px;
      height: 112px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      box-shadow: var(--sh-sm);
    }

    .core-circle svg {
      width: 48px;
      height: 48px;
      color: var(--color-ink-3);
    }

    .floating-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      padding: 6px;
      box-shadow: var(--sh-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .floating-badge svg {
      width: 18px;
      height: 18px;
      stroke: var(--color-ink-2);
      stroke-width: 1.8;
      fill: none;
    }

    .text-center {
      text-align: center;
      max-width: 320px;
    }

    .text-center h2 {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      margin-bottom: var(--sp-2);
    }

    .text-center p {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    /* Recipient card */
    .recipient-card {
      width: 100%;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-lg);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
    }

    .recipient-avatar-box {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-3);
    }

    .recipient-avatar-box svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .recipient-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .recipient-email {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recipient-status-sub {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      margin-top: 1px;
    }

    .sent-pill {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      color: var(--color-ink-3);
      background-color: var(--color-surface-3);
      padding: 3px 12px;
      border-radius: var(--r-full);
      text-transform: uppercase;
      letter-spacing: var(--ls-wide);
    }

    /* Invite more row dashed */
    .invite-more-dashed-row {
      width: 100%;
      background-color: var(--color-surface-2);
      border: 1px dashed var(--color-border);
      border-radius: var(--r-lg);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      cursor: pointer;
      text-decoration: none;
      transition: background-color 150ms var(--ease-out);
    }

    .invite-more-dashed-row:hover {
      background-color: var(--color-surface-3);
    }

    .invite-more-avatar-box {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-3);
    }

    .invite-more-avatar-box svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .invite-more-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .invite-more-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    .invite-more-sub {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      margin-top: 1px;
    }

    .chevron-icon {
      color: var(--color-ink-4);
      display: flex;
      align-items: center;
    }

    .chevron-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Actions */
    .actions-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      padding-top: var(--sp-4);
    }

    .btn {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-bg);
      box-shadow: var(--sh-sm);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-deep);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .btn-secondary {
      background-color: var(--color-surface);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .btn-secondary:hover {
      background-color: var(--color-surface-3);
    }

    /* Toast styling */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translate(-50%, 20px);
      background-color: var(--color-ink);
      color: var(--color-bg);
      padding: 10px 20px;
      border-radius: var(--r-full);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      box-shadow: var(--sh-lg);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms var(--ease-out), transform 250ms var(--ease-out);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* Fixed Bottom Navigation (Premium active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: var(--color-surface-2);
      border-top: 1px solid var(--color-border-soft);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
      transition: color 150ms var(--ease-out);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item:hover {
      color: var(--color-ink);
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Toast Notification -->
  <div class="toast" id="copyToast">Link copied to clipboard</div>

  <div class="mobile-container">
    <!-- Header -->
    <header>
      <div class="header-left">
        <button class="back-btn" onclick="location.href='../5._invite_friend/code.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="header-title">Invitation Sent</div>
      </div>
      <button class="more-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Central loader -->
      <div class="visualizer-wrapper">
        <div class="spinner-track"></div>
        <div class="spinner-ring"></div>
        <div class="core-circle">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <div class="floating-badge">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </div>
      </div>

      <!-- Text Content -->
      <div class="text-center">
        <h2>Invitations Sent</h2>
        <p>Waiting for your friends to join your shared music space. We'll notify you as they arrive.</p>
      </div>

      <!-- Recipient pending card -->
      <div class="recipient-card">
        <div class="recipient-avatar-box">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="recipient-details">
          <span class="recipient-email">alex.rivers@email.com</span>
          <span class="recipient-status-sub">Pending since 2:45 PM</span>
        </div>
        <span class="sent-pill">Sent</span>
      </div>

      <!-- Invite more friends card -->
      <a class="invite-more-dashed-row" href="../5._invite_friend/code.html">
        <div class="invite-more-avatar-box">
          <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
        </div>
        <div class="invite-more-details">
          <span class="invite-more-title">Invite more friends</span>
          <span class="invite-more-sub">2 spots remaining</span>
        </div>
        <div class="chevron-icon">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </a>

      <!-- Action Cluster -->
      <div class="actions-stack">
        <button class="btn btn-primary" onclick="showCopyToast()">
          <svg viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span>Copy Invitation Link</span>
        </button>
        <button class="btn btn-secondary" onclick="location.href='../5._invite_friend/code.html'">Cancel Invitation</button>
      </div>
    </main>

    <!-- Bottom Navigation Bar (Premium Active) -->
    <nav class="bottom-nav">
      <!-- Home -->
      <a class="nav-item" href="../1._home/code.html">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Home</span>
      </a>

      <!-- Search -->
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search</span>
      </a>

      <!-- Library -->
      <a class="nav-item" href="../2._library/code.html">
        <svg viewBox="0 0 24 24">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <span>Library</span>
      </a>

      <!-- Premium (Active) -->
      <a class="nav-item active" href="#">
        <span class="nav-active-pill">
          <svg viewBox="0 0 24 24">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
          <span>Premium</span>
        </span>
      </a>
    </nav>
  </div>

  <script>
    function showCopyToast() {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
  </script>
</body>
</html>
