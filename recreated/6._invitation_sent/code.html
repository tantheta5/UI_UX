<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Sent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", monospace;

      --fs-xs: 0.75rem;    /* 12 */
      --fs-sm: 0.875rem;   /* 14 */
      --fs-base: 1rem;     /* 16 */
      --fs-md: 1.125rem;   /* 18 */
      --fs-lg: 1.375rem;   /* 22 */
      --fs-xl: 1.75rem;    /* 28 */
      --fs-2xl: 2.25rem;   /* 36 */
      --fs-3xl: 3rem;      /* 48 */

      --fw-light: 300;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      --lh-tight: 1.1;
      --lh-snug: 1.25;
      --lh-normal: 1.5;
      --lh-relaxed: 1.7;

      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-widest: 0.18em;

      /* Colors — surfaces */
      --color-bg: #FAF8F6;
      --color-bg-alt: #F3EFEA;
      --color-surface: #FFFFFF;
      --color-surface-2: #FBF9F6;
      --color-surface-3: #F5F1EC;
      --color-border: #E8E1D8;
      --color-border-soft: #EFE9E0;

      /* Colors — ink */
      --color-ink: #1F1B16;
      --color-ink-2: #4A433B;
      --color-ink-3: #6F665B;
      --color-ink-4: #9A9082;
      --color-ink-5: #BFB5A6;

      /* Primary — soft rose */
      --color-primary: #C98B86;
      --color-primary-deep: #A86964;
      --color-primary-soft: #F4DAD6;
      --color-primary-tint: #FBEEEC;

      /* Spacing — 8px system */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 32px;
      --sp-8: 40px;
      --sp-9: 48px;
      --sp-10: 64px;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 999px;

      /* Shadows */
      --sh-xs: 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-sm: 0 2px 6px rgba(31, 27, 22, 0.05), 0 1px 2px rgba(31, 27, 22, 0.04);
      --sh-md: 0 6px 18px rgba(31, 27, 22, 0.06), 0 2px 6px rgba(31, 27, 22, 0.04);
      --sh-lg: 0 14px 36px rgba(31, 27, 22, 0.08), 0 6px 14px rgba(31, 27, 22, 0.05);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --tr-base: 240ms var(--ease-out);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-normal);
      color: var(--color-ink);
      background-color: var(--color-bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .mobile-container {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      background-color: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 56px; /* header */
      padding-bottom: 64px; /* bottom nav */
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      max-width: 430px;
      width: 100%;
      height: 56px;
      background-color: rgba(250, 248, 246, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border-soft);
      display: flex;
      align-items: center;
      padding: 0 var(--sp-4);
      z-index: 100;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    .back-btn, .more-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-ink);
      background: transparent;
      border: none;
      transition: background 150ms var(--ease-out);
    }

    .back-btn:hover, .more-btn:hover {
      background-color: var(--color-surface-3);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--fs-md);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    main {
      padding: var(--sp-6) var(--sp-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-6);
      flex-grow: 1;
      justify-content: center;
    }

    /* Central spinner visualizer */
    .visualizer-wrapper {
      position: relative;
      width: 176px;
      height: 176px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--sp-2);
    }

    .spinner-track {
      position: absolute;
      inset: 0;
      border: 4px solid var(--color-border-soft);
      border-radius: var(--r-full);
    }

    .spinner-ring {
      position: absolute;
      inset: 0;
      border: 4px solid var(--color-primary);
      border-top-color: transparent;
      border-radius: var(--r-full);
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .core-circle {
      width: 112px;
      height: 112px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      box-shadow: var(--sh-sm);
    }

    .core-circle svg {
      width: 48px;
      height: 48px;
      color: var(--color-ink-3);
    }

    .floating-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      padding: 6px;
      box-shadow: var(--sh-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .floating-badge svg {
      width: 18px;
      height: 18px;
      stroke: var(--color-ink-2);
      stroke-width: 1.8;
      fill: none;
    }

    .text-center {
      text-align: center;
      max-width: 320px;
    }

    .text-center h2 {
      font-family: var(--font-serif);
      font-size: var(--fs-xl);
      font-weight: var(--fw-medium);
      color: var(--color-ink);
      margin-bottom: var(--sp-2);
    }

    .text-center p {
      font-size: var(--fs-sm);
      color: var(--color-ink-3);
      line-height: var(--lh-relaxed);
    }

    /* Recipient card */
    .recipient-card {
      width: 100%;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-lg);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
    }

    .recipient-avatar-box {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-3);
    }

    .recipient-avatar-box svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .recipient-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .recipient-email {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recipient-status-sub {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      margin-top: 1px;
    }

    .sent-pill {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      color: var(--color-ink-3);
      background-color: var(--color-surface-3);
      padding: 3px 12px;
      border-radius: var(--r-full);
      text-transform: uppercase;
      letter-spacing: var(--ls-wide);
    }

    /* Invite more row dashed */
    .invite-more-dashed-row {
      width: 100%;
      background-color: var(--color-surface-2);
      border: 1px dashed var(--color-border);
      border-radius: var(--r-lg);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      cursor: pointer;
      text-decoration: none;
      transition: background-color 150ms var(--ease-out);
    }

    .invite-more-dashed-row:hover {
      background-color: var(--color-surface-3);
    }

    .invite-more-avatar-box {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background-color: var(--color-surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-ink-3);
    }

    .invite-more-avatar-box svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .invite-more-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .invite-more-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-ink);
    }

    .invite-more-sub {
      font-size: var(--fs-xs);
      color: var(--color-ink-4);
      margin-top: 1px;
    }

    .chevron-icon {
      color: var(--color-ink-4);
      display: flex;
      align-items: center;
    }

    .chevron-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Actions */
    .actions-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      padding-top: var(--sp-4);
    }

    .btn {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      border-radius: var(--r-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-bg);
      box-shadow: var(--sh-sm);
    }

    .btn-primary:hover {
      background-color: var(--color-primary-deep);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .btn-secondary {
      background-color: var(--color-surface);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .btn-secondary:hover {
      background-color: var(--color-surface-3);
    }

    /* Toast styling */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translate(-50%, 20px);
      background-color: var(--color-ink);
      color: var(--color-bg);
      padding: 10px 20px;
      border-radius: var(--r-full);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      box-shadow: var(--sh-lg);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms var(--ease-out), transform 250ms var(--ease-out);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* Fixed Bottom Navigation (Premium active) */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 430px;
      width: 100%;
      height: 64px;
      background-color: var(--color-surface-2);
      border-top: 1px solid var(--color-border-soft);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 0 var(--sp-4);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-ink-3);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      gap: 2px;
      width: 72px;
      height: 100%;
      transition: color 150ms var(--ease-out);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .nav-item:hover {
      color: var(--color-ink);
    }

    .nav-item.active {
      color: var(--color-primary-deep);
    }

    .nav-item.active svg {
      stroke: var(--color-primary-deep);
      stroke-width: 2;
    }

    .nav-active-pill {
      background-color: var(--color-primary-tint);
      padding: var(--sp-1) var(--sp-4);
      border-radius: var(--r-full);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

  <div class="mobile-container">
    <!-- Header -->
    <header>
      <div class="header-left">
        <button class="back-btn" onclick="location.href='../5._invite_friend/code.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <script>
    function showCopyToast() {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Automatically redirect to Waiting for Friend after 5 seconds
    setTimeout(() => {
      location.href = '../8._waiting_for_friend/code.html';
    }, 5000);

    /* ── CANVAS SPHERE ANIMATION ── */
    const canvas = document.getElementById('sphereCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 320;
    canvas.height = 320;

    const ROSE     = [201, 139, 134]; // #C98B86
    const LAV      = [168, 155, 194]; // #A89BC2
    const SAGE     = [138, 166, 142]; // #8AA68E
    const APRICOT  = [226, 168, 127]; // #E2A87F
    const ROSE_D   = [168, 105, 100]; // #A86964
    const LAV_D    = [132, 122, 160]; // #847AA0
    const SAGE_D   = [107, 135, 112]; // #6B8770
    const ROSE_S   = [244, 218, 214]; // #F4DAD6
    const LAV_S    = [229, 222, 240]; // #E5DEF0
    const APR_S    = [246, 224, 206]; // #F6E0CE

    function rgba(col, a = 1) {
      return `rgba(${col[0]},${col[1]},${col[2]},${a})`;
    }

    function lerpCol(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t,
      ];
    }

    const R = 70; // base radius in px

    function edgeOffset(θ, t) {
      return R * (
        1
        + Math.sin(2  * θ + t * 0.38) * 0.010
        + Math.sin(3  * θ - t * 0.55) * 0.007
        + Math.sin(5  * θ + t * 0.27) * 0.005
        + Math.sin(7  * θ - t * 0.41) * 0.003
      );
    }

    function buildEdgePath(cx, cy, t) {
      const N = 128;
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const θ = (i / N) * Math.PI * 2;
        const r = edgeOffset(θ, t);
        const x = cx + r * Math.cos(θ);
        const y = cy + r * Math.sin(θ);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    const PALETTE = [ROSE, LAV, SAGE, APRICOT, ROSE_S, LAV_S, APR_S];
    const PARTICLES = Array.from({ length: 40 }, () => {
      const orbitR  = R + 12 + Math.random() * 50;
      return {
        angle:  Math.random() * Math.PI * 2,
        orbitR,
        speed:  (Math.random() - 0.5) * 0.004,
        size:   Math.random() * 1.5 + 0.5,
        alpha:  Math.random() * 0.4 + 0.1,
        col:    PALETTE[Math.floor(Math.random() * PALETTE.length)],
        phase:  Math.random() * Math.PI * 2,
        wobble: Math.random() * 6 + 2,
      };
    });

    function drawParticles(cx, cy, t) {
      for (const p of PARTICLES) {
        p.angle += p.speed;
        const wobble = Math.sin(t * 1.05 + p.phase) * p.wobble;
        const dist   = p.orbitR + wobble;
        const px = cx + dist * Math.cos(p.angle);
        const py = cy + dist * Math.sin(p.angle);

        if (Math.hypot(px - cx, py - cy) < R - 8) continue;

        const a = p.alpha * (0.5 + 0.5 * Math.sin(t * 0.85 + p.phase));

        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = rgba(p.col, a);
        ctx.fill();

        const h = ctx.createRadialGradient(px, py, 0, px, py, p.size * 4);
        h.addColorStop(0, rgba(p.col, a * 0.3));
        h.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(px, py, p.size * 4, 0, Math.PI * 2);
        ctx.fillStyle = h;
        ctx.fill();
      }
    }

    let t = 0;
    function draw() {
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;

      ctx.clearRect(0, 0, W, H);

      // Outer Corona Bloom
      const coronaColors = [ROSE, LAV, SAGE, APRICOT];
      const ci = Math.floor((t * 0.15) % coronaColors.length);
      const cf = (t * 0.15) % 1;
      const coronaCol = lerpCol(coronaColors[ci], coronaColors[(ci + 1) % coronaColors.length], cf);

      const corona = ctx.createRadialGradient(cx, cy, R * 0.8, cx, cy, R * 2.0);
      corona.addColorStop(0,   rgba(coronaCol, 0.18));
      corona.addColorStop(0.4, rgba(lerpCol(LAV, APRICOT, (Math.sin(t * 0.3) + 1) / 2), 0.07));
      corona.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, R * 2.0, 0, Math.PI * 2);
      ctx.fillStyle = corona;
      ctx.fill();

      // Particles behind sphere
      drawParticles(cx, cy, t);

      // Sphere
      ctx.save();
      buildEdgePath(cx, cy, t);
      ctx.clip();

      const SR = R * 1.4;
      const rx = cx - SR, ry = cy - SR, rw = SR * 2, rh = SR * 2;

      // Layer 1: Base sweep
      const baseAngle = t * 0.10;
      const bx1 = cx + Math.cos(baseAngle) * SR;
      const by1 = cy + Math.sin(baseAngle) * SR;
      const bx2 = cx - Math.cos(baseAngle) * SR;
      const by2 = cy - Math.sin(baseAngle) * SR;

      const g1 = ctx.createLinearGradient(bx1, by1, bx2, by2);
      g1.addColorStop(0.00, rgba(ROSE_D,   1));
      g1.addColorStop(0.22, rgba(ROSE,     1));
      g1.addColorStop(0.44, rgba(LAV,      1));
      g1.addColorStop(0.66, rgba(SAGE,     1));
      g1.addColorStop(0.85, rgba(APRICOT,  1));
      g1.addColorStop(1.00, rgba(LAV_D,    1));
      ctx.fillStyle = g1;
      ctx.fillRect(rx, ry, rw, rh);

      // Layer 2: Overlay gradient
      const secAngle = -t * 0.065 + 1.8;
      const g2 = ctx.createLinearGradient(
        cx + Math.cos(secAngle) * SR * 0.9, cy + Math.sin(secAngle) * SR * 0.9,
        cx - Math.cos(secAngle) * SR * 0.9, cy - Math.sin(secAngle) * SR * 0.9
      );
      g2.addColorStop(0.00, rgba(LAV,    0.55));
      g2.addColorStop(0.40, rgba(SAGE,   0.30));
      g2.addColorStop(0.70, rgba(APRICOT,0.40));
      g2.addColorStop(1.00, rgba(ROSE,   0.25));
      ctx.globalCompositeOperation = 'soft-light';
      ctx.fillStyle = g2;
      ctx.fillRect(rx, ry, rw, rh);
      ctx.globalCompositeOperation = 'source-over';

      // Layer 3: Shimmer bloom
      const driftX = cx + Math.cos(t * 0.19 + 2.5) * R * 0.55;
      const driftY = cy + Math.sin(t * 0.27 + 1.1) * R * 0.45;
      const shimmerCol = lerpCol(
        lerpCol(LAV, APRICOT, (Math.sin(t * 0.31) + 1) / 2),
        SAGE,
        (Math.sin(t * 0.17 + 1) + 1) / 2
      );
      const g3 = ctx.createRadialGradient(driftX, driftY, 0, driftX, driftY, R * 1.1);
      g3.addColorStop(0,   rgba(shimmerCol, 0.45));
      g3.addColorStop(0.6, rgba(shimmerCol, 0.12));
      g3.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = g3;
      ctx.fillRect(rx, ry, rw, rh);

      // Layer 4: Diffuse light 3D
      const lightX = cx - R * 0.52 + Math.cos(t * 0.16) * R * 0.14;
      const lightY = cy - R * 0.50 + Math.sin(t * 0.21) * R * 0.11;

      const diffuse = ctx.createRadialGradient(lightX, lightY, 0, cx, cy, R * 1.30);
      diffuse.addColorStop(0.00, 'rgba(255,255,255,0.38)');
      diffuse.addColorStop(0.30, 'rgba(255,255,255,0.08)');
      diffuse.addColorStop(0.60, 'rgba(0,0,0,0)');
      diffuse.addColorStop(1.00, 'rgba(0,0,0,0.58)');
      ctx.fillStyle = diffuse;
      ctx.fillRect(rx, ry, rw, rh);

      // Layer 5: Specular highlight
      const specX = lightX + R * 0.08;
      const specY = lightY + R * 0.05;
      const specGrad = ctx.createRadialGradient(specX, specY, 0, specX, specY, R * 0.34);
      specGrad.addColorStop(0.00, 'rgba(255,255,255,0.95)');
      specGrad.addColorStop(0.12, 'rgba(255,255,255,0.65)');
      specGrad.addColorStop(0.35, 'rgba(255,255,255,0.20)');
      specGrad.addColorStop(0.65, 'rgba(255,255,255,0.04)');
      specGrad.addColorStop(1.00, 'rgba(255,255,255,0.00)');
      ctx.fillStyle = specGrad;
      ctx.fillRect(rx, ry, rw, rh);

      // Layer 6: Rim light
      const rimX = cx - lightX + cx + Math.cos(t * 0.09) * R * 0.08;
      const rimY = cy - lightY + cy + Math.sin(t * 0.13) * R * 0.06;
      const rimCol = lerpCol(APRICOT, LAV, (Math.sin(t * 0.38) + 1) / 2);
      const rim = ctx.createRadialGradient(rimX, rimY, R * 0.55, rimX, rimY, R * 1.35);
      rim.addColorStop(0,   rgba(rimCol, 0.48));
      rim.addColorStop(0.5, rgba(rimCol, 0.18));
      rim.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = rim;
      ctx.fillRect(rx, ry, rw, rh);

      // Layer 7: AO
      const ao = ctx.createRadialGradient(cx + R * 0.45, cy + R * 0.50, 0, cx + R * 0.3, cy + R * 0.35, R * 1.15);
      ao.addColorStop(0,   rgba(LAV_D, 0.50));
      ao.addColorStop(0.4, rgba(ROSE_D, 0.18));
      ao.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = ao;
      ctx.fillRect(rx, ry, rw, rh);

      ctx.restore(); // end clip

      // Edge Glow
      ctx.save();
      buildEdgePath(cx, cy, t);
      ctx.shadowColor = rgba(LAV, 0.85);
      ctx.shadowBlur  = 16;
      ctx.strokeStyle = rgba(lerpCol(LAV, APRICOT, (Math.sin(t * 0.28) + 1) / 2), 0.45);
      ctx.lineWidth   = 2;
      ctx.stroke();
      ctx.restore();

      ctx.save();
      buildEdgePath(cx, cy, t);
      ctx.shadowColor = rgba(ROSE, 0.6);
      ctx.shadowBlur  = 8;
      ctx.strokeStyle = rgba(ROSE_S, 0.18);
      ctx.lineWidth   = 1;
      ctx.stroke();
      ctx.restore();

      t += 0.010;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
