<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Background Test 2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      width: 430px;
      height: 932px;
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      background-color: #FFFDE6; /* warm off-white cream base */
    }

    /* The background container containing our blobs */
    .bg-gradient {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      filter: blur(60px); /* slightly sharper than 80px for richer color borders */
    }

    /* Blob elements - normal blend mode, high opacity */
    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.85;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    /* Let's define the blobs with the warm tones of the reference image */
    /* Crimson Red Blob - top right */
    .blob-1 {
      top: -5%;
      right: -15%;
      width: 320px;
      height: 320px;
      background: #DE3741;
      animation: move-1 22s infinite alternate;
    }

    /* Bright Golden Yellow Blob - center / bottom right */
    .blob-2 {
      bottom: 10%;
      right: -10%;
      width: 380px;
      height: 380px;
      background: #FFB800;
      animation: move-2 26s infinite alternate;
    }

    /* Creamy Pale Yellow Blob - top left */
    .blob-3 {
      top: -10%;
      left: -10%;
      width: 350px;
      height: 350px;
      background: #FFF8D4;
      animation: move-3 18s infinite alternate;
    }

    /* Bright Yellow Blob - center left */
    .blob-4 {
      top: 30%;
      left: -15%;
      width: 300px;
      height: 300px;
      background: #FFD600;
      animation: move-4 20s infinite alternate;
    }

    /* Crimson Red Blob - bottom left */
    .blob-5 {
      bottom: -10%;
      left: -15%;
      width: 360px;
      height: 360px;
      background: #E03546;
      animation: move-5 24s infinite alternate;
    }

    /* Soft Peach Orange - middle right */
    .blob-6 {
      top: 35%;
      right: -20%;
      width: 280px;
      height: 280px;
      background: #FF7A00;
      animation: move-6 23s infinite alternate;
    }

    /* Animations for organic liquid movement */
    @keyframes move-1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-60px, 80px) scale(1.1); }
      100% { transform: translate(30px, -30px) scale(0.9); }
    }

    @keyframes move-2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, -60px) scale(0.95); }
      100% { transform: translate(-40px, 40px) scale(1.05); }
    }

    @keyframes move-3 {
      0% { transform: translate(0, 0) scale(1.05); }
      50% { transform: translate(-40px, 60px) scale(0.9); }
      100% { transform: translate(60px, -40px) scale(1); }
    }

    @keyframes move-4 {
      0% { transform: translate(0, 0) scale(0.9); }
      50% { transform: translate(60px, -50px) scale(1.1); }
      100% { transform: translate(-30px, 60px) scale(1); }
    }

    @keyframes move-5 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 90px) scale(0.9); }
      100% { transform: translate(-60px, -30px) scale(1.15); }
    }

    @keyframes move-6 {
      0% { transform: translate(0, 0) scale(1.1); }
      50% { transform: translate(-70px, -40px) scale(0.9); }
      100% { transform: translate(40px, 50px) scale(1.05); }
    }

    /* Noise overlay with SVG fractal noise */
    .noise-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15; /* Increased opacity to match the beautiful grain of the user's reference image */
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay; /* Better overlay blending */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Glassmorphism content container */
    .content {
      position: relative;
      z-index: 3;
      padding: 40px;
      color: #1F1B16;
      height: 100%;
      box-sizing: border-box;
    }

    .card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 24px;
      margin-top: 50px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Dynamic background wrapper -->
    <div class="bg-gradient">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
      <div class="blob blob-5"></div>
      <div class="blob blob-6"></div>
    </div>
    <!-- Grain/Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Content -->
    <div class="content">
      <h1>Good evening</h1>
      <p>This is a dynamic background demo.</p>
      <div class="card">
        <h3>Midnight Jazz Essentials</h3>
        <p>Curated for you</p>
      </div>
    </div>
  </div>
</body>
</html>
