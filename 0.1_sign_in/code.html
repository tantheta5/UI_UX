<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-fixed": "#e3e1ec",
                      "on-tertiary-fixed": "#1b1b1b",
                      "on-tertiary-container": "#848484",
                      "outline-variant": "#cfc4c5",
                      "on-primary-fixed": "#1b1b1b",
                      "secondary-fixed-dim": "#c6c5cf",
                      "tertiary-fixed": "#e2e2e2",
                      "on-surface": "#1a1c1d",
                      "on-secondary-fixed-variant": "#46464e",
                      "on-secondary": "#ffffff",
                      "outline": "#7e7576",
                      "error": "#ba1a1a",
                      "tertiary-fixed-dim": "#c6c6c6",
                      "surface-variant": "#e2e2e3",
                      "surface-container-low": "#f3f3f4",
                      "surface-dim": "#dadadb",
                      "on-secondary-fixed": "#1a1b22",
                      "background": "#f9f9fa",
                      "on-tertiary": "#ffffff",
                      "on-error": "#ffffff",
                      "primary-container": "#1b1b1b",
                      "on-tertiary-fixed-variant": "#474747",
                      "surface-container": "#eeeeef",
                      "primary-fixed-dim": "#c6c6c6",
                      "surface-container-highest": "#e2e2e3",
                      "on-error-container": "#93000a",
                      "on-secondary-container": "#63646c",
                      "primary-fixed": "#e2e2e2",
                      "primary": "#000000",
                      "surface": "#f9f9fa",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-fixed-variant": "#474747",
                      "error-container": "#ffdad6",
                      "surface-tint": "#5e5e5e",
                      "on-primary": "#ffffff",
                      "inverse-primary": "#c6c6c6",
                      "inverse-on-surface": "#f0f1f2",
                      "secondary-container": "#e3e1ec",
                      "on-primary-container": "#848484",
                      "surface-container-high": "#e8e8e9",
                      "tertiary": "#000000",
                      "on-surface-variant": "#4c4546",
                      "tertiary-container": "#1b1b1b",
                      "secondary": "#5d5e66",
                      "on-background": "#1a1c1d",
                      "inverse-surface": "#2f3132",
                      "surface-bright": "#f9f9fa"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "2xl": "48px",
                      "md": "16px",
                      "3xl": "64px",
                      "lg": "24px",
                      "base": "4px",
                      "xl": "32px",
                      "sm": "8px",
                      "margin-mobile": "16px",
                      "gutter": "16px",
                      "xs": "4px",
                      "margin-desktop": "32px"
              },
              "fontFamily": {
                      "headline-xl-mobile": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "body-sm": ["Inter"],
                      "label-sm": ["Inter"],
                      "label-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-xl": ["Inter"]
              },
              "fontSize": {
                      "headline-xl-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flex items-center justify-between px-margin-mobile h-14">
<button aria-label="Go back" class="flex items-center justify-center w-11 h-11 hover:bg-surface-container-high rounded-full transition-colors duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex-grow flex justify-center mr-11">
<h1 class="font-headline-md text-headline-md font-bold text-primary">Sign In</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-2xl pb-3xl px-margin-mobile flex flex-col mt-14">
<!-- Welcome Section -->
<div class="mt-lg mb-xl">
<h2 class="font-headline-xl-mobile text-headline-xl-mobile text-on-surface">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Please enter your credentials to access your account.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg" onsubmit="return false;">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<input class="w-full h-12 px-md font-body-md text-body-md bg-white border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="name@example.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<button class="font-label-sm text-label-sm text-primary hover:underline">Forgot Password?</button>
</div>
<div class="relative">
<input class="w-full h-12 px-md font-body-md text-body-md bg-white border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-md text-label-md font-bold hover:opacity-90 active:scale-[0.98] transition-all mt-md flex items-center justify-center">
                Sign In
            </button>
</form>
<!-- Divider Section -->
<div class="flex items-center my-2xl">
<div class="flex-grow h-px bg-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-grow h-px bg-outline-variant"></div>
</div>
<!-- Social Login Grid -->
<div class="flex flex-col gap-md">
<!-- Google -->
<button class="w-full h-12 border border-outline bg-white text-on-surface rounded-lg font-label-md text-label-md flex items-center justify-center gap-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span> <!-- Placeholder for Google Logo -->
<span>Continue with Google</span>
</button>
<!-- Apple -->
<button class="w-full h-12 border border-outline bg-white text-on-surface rounded-lg font-label-md text-label-md flex items-center justify-center gap-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="apple" style="font-variation-settings: 'FILL' 1;">apps</span>
<span>Continue with Apple</span>
</button>
</div>
<!-- Secondary Action -->
<div class="mt-auto pt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <button class="text-primary font-bold hover:underline">Sign up for free</button>
</p>
</div>
</main>
<!-- Visual Polish: Optional atmospheric element -->
<div class="fixed bottom-0 left-0 w-full h-64 -z-10 opacity-30 pointer-events-none">
<div class="w-full h-full bg-cover bg-bottom opacity-20" data-alt="A subtle, minimalist grayscale abstract background featuring soft fluid curves and elegant geometric gradients. The lighting is ethereal and diffused, perfectly complementing a professional wireframe user interface. The composition is clean, airy, and highlights a high-end digital design aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDbYYkg3cpWFBReiokCbswzIqiuXWvnzHiaBBIBFga0RIjhKnln2q1qg6iw4P7IWqpNzW88HIkb2O5aKZvdspIID1Xk7C8-VcEbXRKJkA1V-4kzr0sI9EvnOvq0GxP-_JgvbSUdHUf0l7mKVrK9WIMHK167ZlShO0xQnT5zCrsfQaiZVedUTIrLicVlSGfLvV1oT1ZvvXMsaZak48Jk6XVULyytVwsOqb3OAZFgfPjDEZvpAAISRt5D')"></div>
</div>
<!-- Interaction Script -->
<script>
        // Simple input focus effects and basic micro-interactions
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Suppression Logic (from instructions): Since this is a task-focused screen (Sign In), 
        // we omit BottomNavBar and FAB as per the "Destination" rule.
    </script>
</body></html>
