            "spacing": {

                    "margin-mobile": "16px",

                    "xs": "4px",

            },
            "fontFamily": {
                    "headline-xl-mobile": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-md": ["Inter"],

            "fontSize": {

                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9fa;
        }
        .chip-selected {
            background-color: #000000 !important;
            color: #ffffff !important;
            border-color: #000000 !important;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top Navigation Bar (Suppressed items for focus) -->
<header class="fixed top-0 w-full z-50 bg-surface flex items-center justify-between px-margin-mobile h-14 border-b border-outline-variant">
<button aria-label="Go back" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary">Create Account</span>
<button aria-label="Settings" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-14 pb-32 px-margin-mobile max-w-md mx-auto w-full">
<!-- Header Section -->
<section class="mt-xl mb-xl">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile text-primary mb-sm">Tell us what you love</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Select at least 3 genres or artists to personalize your soundtrack. Your feed will adapt to your taste.</p>
</section>
<!-- Search Bar -->
<div class="relative mb-lg">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full h-12 pl-11 pr-md bg-surface-container-lowest border-2 border-outline-variant rounded-lg focus:border-primary focus:ring-0 transition-all font-body-sm text-body-sm" placeholder="Search genres or artists..." type="text">
</div>
<!-- Preference Grid -->
<div class="grid grid-cols-2 gap-sm">
<!-- Functional Chip Component -->
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="library_music">library_music</span>
</div>
<span class="font-label-md text-label-md">Techno</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="piano">piano</span>
</div>
<span class="font-label-md text-label-md">Classical</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="electric_guitar">electric_car</span>
</div>
<span class="font-label-md text-label-md">Rock</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mic_external_on">mic_external_on</span>
</div>
<span class="font-label-md text-label-md">Hip Hop</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="radio">radio</span>
</div>
<span class="font-label-md text-label-md">Jazz</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="spatial_audio">spatial_audio</span>
</div>
<span class="font-label-md text-label-md">Ambient</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="graphic_eq">graphic_eq</span>
</div>
<span class="font-label-md text-label-md">Electronic</span>
</button>
<button class="group flex flex-col items-center justify-center p-md border border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all aspect-square text-center" onclick="toggleChip(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="speaker">speaker</span>
</div>
<span class="font-label-md text-label-md">Indie</span>
</button>
</div>
</main>
<!-- Fixed Bottom Actions Container -->
<footer class="fixed bottom-0 w-full bg-surface border-t border-outline-variant p-margin-mobile flex flex-col gap-sm">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-sm text-label-sm text-on-surface-variant" id="counter-text">0 selected</span>
<button class="font-label-md text-label-md text-primary hover:underline">Skip</button>
</div>
<button class="w-full h-12 bg-outline-variant text-on-primary-fixed rounded-lg font-label-md text-label-md transition-all flex items-center justify-center gap-base opacity-50 cursor-not-allowed" disabled="" id="continue-btn">
            Continue
            <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<script>
        let selectedCount = 0;
        const continueBtn = document.getElementById('continue-btn');
        const counterText = document.getElementById('counter-text');

        function toggleChip(el) {
            const isSelected = el.classList.contains('chip-selected');
            const icon = el.querySelector('.material-symbols-outlined');
            
            if (isSelected) {
                el.classList.remove('chip-selected');
                el.classList.add('bg-surface-container-low');
                icon.classList.remove('text-on-primary');
                icon.classList.add('text-on-surface-variant');
                selectedCount--;
            } else {
                el.classList.add('chip-selected');
                el.classList.remove('bg-surface-container-low');
                icon.classList.remove('text-on-surface-variant');
                icon.classList.add('text-on-primary');
                selectedCount++;
            }

            updateUI();
        }

        function updateUI() {
            counterText.innerText = `${selectedCount} selected`;
            
            if (selectedCount >= 3) {
                continueBtn.disabled = false;
                continueBtn.classList.remove('bg-outline-variant', 'opacity-50', 'cursor-not-allowed');
                continueBtn.classList.add('bg-primary', 'text-on-primary');
            } else {
                continueBtn.disabled = true;
                continueBtn.classList.add('bg-outline-variant', 'opacity-50', 'cursor-not-allowed');
                continueBtn.classList.remove('bg-primary', 'text-on-primary');
            }
        }
    </script>
</body></html>
