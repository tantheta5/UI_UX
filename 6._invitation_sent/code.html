<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Invitation Sent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fa;
        }
    </style>
<script id="tailwind-config">

          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#2f3132",
                      "tertiary-fixed-dim": "#c6c6c6",

                      "surface-tint": "#5e5e5e",
                      "error-container": "#ffdad6",

                      "on-secondary-fixed": "#1a1b22",
                      "surface-bright": "#f9f9fa",
                      "on-primary-fixed": "#1b1b1b",
                      "on-error-container": "#93000a",
                      "background": "#f9f9fa",
                      "error": "#ba1a1a",
                      "surface-dim": "#dadadb",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#f0f1f2",
                      "surface-container-high": "#e8e8e9",
                      "on-background": "#1a1c1d",
                      "primary": "#000000",
                      "outline-variant": "#cfc4c5",
                      "on-surface-variant": "#4c4546",
                      "on-tertiary-container": "#848484",
                      "on-primary-container": "#848484",
                      "surface-container-low": "#f3f3f4",
                      "on-primary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-surface": "#1a1c1d",
                      "secondary-fixed": "#e3e1ec",
                      "surface-variant": "#e2e2e3",
                      "secondary-container": "#e3e1ec",
                      "tertiary": "#000000",
                      "on-tertiary-fixed-variant": "#474747",
                      "on-secondary-container": "#63646c",
                      "on-primary-fixed-variant": "#474747",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed": "#e2e2e2",
                      "on-secondary-fixed-variant": "#46464e",
                      "on-error": "#ffffff",
                      "surface-container": "#eeeeef",
                      "inverse-primary": "#c6c6c6",
                      "tertiary-container": "#1b1b1b",
                      "outline": "#7e7576",
                      "on-tertiary-fixed": "#1b1b1b",
                      "secondary-fixed-dim": "#c6c5cf",
                      "primary-container": "#1b1b1b",
                      "secondary": "#5d5e66"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "margin-desktop": "32px",
                      "gutter": "16px",
                      "md": "16px",
                      "margin-mobile": "16px",
                      "base": "4px",
                      "xl": "32px",
                      "sm": "8px",
                      "2xl": "48px",
                      "lg": "24px",
                      "xs": "4px",
                      "3xl": "64px"
              },
              "fontFamily": {

                      "body-sm": ["Inter"],
                      "body-md": ["Inter"],

              },
              "fontSize": {

                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flex items-center justify-between px-margin-mobile h-14 w-full">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Invitation Sent</h1>
</div>
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors duration-200">
<span class="material-symbols-outlined text-primary" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile pt-14 pb-16">
<div class="w-full max-w-md mx-auto space-y-10 text-center animate-in fade-in duration-700">
<!-- Visual Feedback Asset -->
<div class="relative flex justify-center">
<div class="w-48 h-48 rounded-full bg-surface-container flex items-center justify-center relative overflow-hidden">
<!-- Circular Progress Indicator (Static for Wireframe) -->
<div class="absolute inset-0 border-4 border-outline-variant rounded-full opacity-20"></div>
<div class="absolute inset-0 border-4 border-primary rounded-full border-t-transparent animate-spin duration-[3000ms]"></div>
<div class="z-10 bg-surface border border-outline-variant rounded-full w-24 h-24 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-5xl" data-icon="group" style="font-variation-settings: &quot;FILL&quot; 1;">group</span></div>
</div>
<!-- Floating Particle Micro-interaction -->
<div class="absolute -right-4 top-0 bg-surface border border-outline-variant p-3 rounded-xl rotate-12 shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="schedule">schedule</span>
</div>
</div>
<!-- Content -->
<div class="space-y-4">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Invitations Sent</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">Waiting for your friends to join your shared music space. We'll notify you as they arrive.</p>
</div>
<!-- Recipient Detail Card (Bento Style) -->
<div class="bg-surface border border-outline-variant rounded-xl p-md flex items-center gap-4 text-left">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
</div>
<div class="flex-grow">
<div class="font-label-md text-label-md text-on-surface">alex.rivers@email.com</div>
<div class="font-label-sm text-label-sm text-on-surface-variant">Pending since 2:45 PM</div>
</div>
<div class="px-3 py-1 bg-surface-container-high rounded-full font-label-sm text-label-sm">Sent</div>
</div><button class="w-full bg-surface-container-low border border-dashed border-outline-variant rounded-xl p-md flex items-center gap-4 text-left hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="person_add">person_add</span>
</div>
<div class="flex-grow">
<div class="font-label-md text-label-md text-on-surface">Invite more friends</div>
<div class="font-label-sm text-label-sm text-on-surface-variant">2 spots remaining</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Action Cluster -->
<div class="space-y-3 pt-6">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary py-4 px-6 rounded-lg font-label-md text-label-md hover:bg-zinc-800 transition-colors active:scale-95 duration-150" onclick="copyToClipboard()">
<span class="material-symbols-outlined text-lg" data-icon="content_copy">content_copy</span>
                    Copy Invitation Link
                </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface py-4 px-6 rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
                    Cancel Invitation
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface-container border-t border-outline-variant flex justify-around items-center h-16 w-full px-4 pb-safe">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:text-primary transition-transform duration-150 active:scale-90">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:text-primary transition-transform duration-150 active:scale-90">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-label-sm text-label-sm">Search</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:text-primary transition-transform duration-150 active:scale-90">
<span class="material-symbols-outlined" data-icon="library_music">library_music</span>
<span class="font-label-sm text-label-sm">Library</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 transition-transform duration-150 active:scale-90">
<span class="material-symbols-outlined" data-icon="workspace_premium" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label-sm text-label-sm">Premium</span>
</button>
</nav>
<!-- Simple Toast Notification (Hidden by default) -->
<div class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4" id="copy-toast">
        Link copied to clipboard
    </div>
<script>
        function copyToClipboard() {
            const toast = document.getElementById('copy-toast');
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }
    </script>


</body></html>
